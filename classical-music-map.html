<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scandal & Symphony</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#1a1f2e;--surface:#222736;--surface2:#272d3e;
  --border:rgba(255,255,255,0.10);--border2:rgba(255,255,255,0.18);
  --gold:#ffe066;--gold-dim:#b07828;--silver:#8a96a8;--silver-dim:#4a5468;
  --gold-minor:#d4922e;
  --text:#e8eaf0;--muted:#7a8494;
  --land:#6b8fa8;--land-hi:#85aec8;--land-act:#5ba0d0;--sea:#2a3550;
  --green:#22c55e;--green-dim:rgba(34,197,94,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow:hidden;user-select:none;}
#app{display:flex;flex-direction:column;height:100vh;width:100vw;}
#header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0.7rem 1.6rem;border-bottom:1px solid var(--border);background:var(--surface);gap:1rem;}
.logo{display:flex;align-items:baseline;gap:0.5rem;}
.logo-title{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:600;color:var(--text);letter-spacing:-0.01em;}
.logo-title em{font-style:italic;color:var(--gold);}
.logo-sub{font-size:0.65rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;}
#era-badge{font-size:0.72rem;font-weight:500;color:var(--gold);background:rgba(240,192,96,0.1);border:1px solid rgba(240,192,96,0.2);padding:4px 14px;border-radius:20px;letter-spacing:0.04em;transition:all 0.3s;white-space:nowrap;}
#legend{display:flex;align-items:center;gap:14px;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:0.65rem;color:var(--muted);letter-spacing:0.04em;}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.legend-dot.major{background:var(--gold);box-shadow:0 0 6px rgba(240,192,96,0.5);}
.legend-dot.minor{background:var(--gold-minor);}

#map-wrap{flex:1;position:relative;overflow:hidden;background:var(--sea);}
#map-svg{width:100%;height:100%;}
.country{fill:var(--land);stroke:rgba(255,255,255,0.12);stroke-width:0.5px;transition:fill 0.3s;cursor:default;}
.country.has-composer{fill:var(--land-hi);cursor:pointer;}
.country.has-composer:hover{fill:#4a6a88;}
.country.active-composer{fill:var(--land-act);}
.country.out-of-region{fill:#3a4a60;}
.pin-major{cursor:pointer;}
.pin-pulse{fill:none;stroke:var(--gold);stroke-width:1;opacity:0;animation:pulse 2.5s ease-out infinite;}
@keyframes pulse{0%{r:5;opacity:0.6}100%{r:18;opacity:0}}
.pin-dot-major{fill:var(--gold);stroke:var(--bg);stroke-width:1.5;transition:r 0.15s;filter:drop-shadow(0 0 8px rgba(255,224,102,0.8));}
.pin-major:hover .pin-dot-major{r:8;}
.pin-label-major{font-family:'Inter',sans-serif;font-size:10px;font-weight:500;fill:var(--text);pointer-events:none;opacity:0;transition:opacity 0.1s;paint-order:stroke;stroke:rgba(15,17,23,0.95);stroke-width:3px;stroke-linejoin:round;}
.pin-major:hover .pin-label-major{opacity:1;}
.pin-minor{cursor:pointer;}
.pin-dot-minor{fill:var(--gold-minor);stroke:rgba(0,0,0,0.5);stroke-width:1.2;transition:r 0.12s,fill 0.12s;filter:drop-shadow(0 0 3px rgba(212,146,46,0.5));}
.pin-minor:hover .pin-dot-minor{fill:var(--gold-dim);r:5;}
.pin-label-minor{font-family:'Inter',sans-serif;font-size:9.5px;font-weight:400;fill:var(--gold-dim);pointer-events:none;opacity:0;transition:opacity 0.1s;paint-order:stroke;stroke:rgba(15,17,23,0.95);stroke-width:3px;}
.pin-minor:hover .pin-label-minor{opacity:1;}
#timeline-wrap{flex-shrink:0;padding:0.6rem 1.6rem 0.9rem;background:var(--surface);border-top:1px solid var(--border);}
#era-markers{display:flex;justify-content:space-between;margin-bottom:6px;padding:0 6px;}
.era-marker{font-size:0.58rem;font-weight:500;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;}
#scrubber-track{position:relative;height:32px;cursor:pointer;display:flex;align-items:center;}
#track-bg{position:absolute;left:0;right:0;height:3px;background:var(--border);border-radius:2px;}
#track-eras{position:absolute;left:0;right:0;height:3px;border-radius:2px;overflow:hidden;display:flex;}
.era-seg{height:100%;opacity:0.5;}
#track-fill{position:absolute;left:0;height:3px;background:linear-gradient(to right,var(--gold-dim),var(--gold));border-radius:2px;pointer-events:none;z-index:2;}
#scrubber-handle{position:absolute;width:20px;height:20px;background:var(--gold);border-radius:50%;border:3px solid var(--surface);box-shadow:0 0 0 1px var(--gold-dim),0 2px 8px rgba(0,0,0,0.5);cursor:grab;transform:translateX(-50%);z-index:10;top:50%;margin-top:-10px;transition:box-shadow 0.15s;}
#scrubber-handle:hover,#scrubber-handle.dragging{box-shadow:0 0 0 2px var(--gold),0 0 16px rgba(240,192,96,0.4),0 2px 8px rgba(0,0,0,0.5);cursor:grabbing;}
#year-tooltip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);color:var(--gold);font-family:'Inter',sans-serif;font-size:0.95rem;font-weight:600;padding:3px 12px;border-radius:6px;white-space:nowrap;pointer-events:none;letter-spacing:0.02em;}
#year-tooltip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:var(--border2);}
#modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;z-index:300;padding:1rem;backdrop-filter:blur(8px);}
#modal-backdrop.open{display:flex;}
#modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:520px;overflow:hidden;animation:modalIn 0.2s cubic-bezier(0.22,1,0.36,1);box-shadow:0 24px 60px rgba(0,0,0,0.6);}
@keyframes modalIn{from{transform:translateY(12px) scale(0.98);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.modal-header{display:flex;align-items:stretch;border-bottom:1px solid var(--border);}
.modal-year-col{background:rgba(240,192,96,0.06);border-right:1px solid var(--border);padding:1.2rem 1rem;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:82px;gap:3px;}
.m-born-lbl{font-size:0.55rem;font-weight:500;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;}
.m-year{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--gold);font-weight:600;line-height:1;}
.m-era-tag{font-size:0.52rem;font-weight:500;color:var(--gold-dim);text-transform:uppercase;letter-spacing:0.08em;margin-top:3px;text-align:center;}
.modal-title-col{flex:1;padding:1rem 0.9rem 1rem 1.1rem;}
.m-composer{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:600;color:var(--text);line-height:1.2;}
.m-country{font-size:0.6rem;font-weight:500;letter-spacing:0.1em;color:var(--muted);margin-top:5px;text-transform:uppercase;}
.m-genre{display:inline-block;font-size:0.58rem;font-weight:500;letter-spacing:0.06em;color:var(--gold-dim);border:1px solid rgba(240,192,96,0.15);padding:2px 8px;border-radius:4px;margin-top:6px;}
#m-close{align-self:flex-start;margin:0.8rem 0.8rem 0 0;background:none;border:1px solid var(--border);border-radius:6px;width:26px;height:26px;color:var(--muted);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;font-family:sans-serif;}
#m-close:hover{border-color:var(--border2);color:var(--text);background:var(--surface2);}
.modal-body{padding:1.1rem 1.3rem;border-bottom:1px solid var(--border);}
.m-bio{font-size:0.88rem;font-weight:300;color:#9aa0b0;line-height:1.85;}
.modal-media{padding:1rem 1.3rem 1.1rem;display:flex;align-items:center;gap:10px;}
.listen-btn{font-family:'Inter',sans-serif;font-size:0.75rem;font-weight:500;letter-spacing:0.03em;color:var(--gold);background:rgba(240,192,96,0.08);border:1px solid rgba(240,192,96,0.2);border-radius:6px;padding:7px 16px;text-decoration:none;transition:all 0.15s;white-space:nowrap;}
.listen-btn:hover{background:rgba(240,192,96,0.15);border-color:rgba(240,192,96,0.35);}
.listen-btn.green{color:var(--green);background:var(--green-dim);border-color:rgba(34,197,94,0.25);}
.listen-btn.green:hover{background:rgba(34,197,94,0.18);}
#minor-modal-backdrop{display:none;position:fixed;inset:0;z-index:300;padding:1rem;align-items:center;justify-content:center;}
#minor-modal-backdrop.open{display:flex;}
#minor-modal{background:var(--surface);border:1px solid var(--border2);border-radius:10px;width:100%;max-width:400px;overflow:hidden;animation:modalIn 0.18s cubic-bezier(0.22,1,0.36,1);box-shadow:0 20px 50px rgba(0,0,0,0.6);}
.mm-header{display:flex;align-items:stretch;border-bottom:1px solid var(--border);}
.mm-year-col{background:rgba(138,150,168,0.06);border-right:1px solid var(--border);padding:0.9rem 0.8rem;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:68px;gap:2px;}
.mm-born-lbl{font-size:0.52rem;font-weight:500;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase;}
.mm-year{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--silver);font-weight:600;line-height:1;}
.mm-era{font-size:0.5rem;font-weight:500;color:var(--silver-dim);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px;text-align:center;}
.mm-title-col{flex:1;padding:0.85rem 0.85rem 0.85rem 1rem;}
.mm-name{font-family:'Playfair Display',serif;font-size:1rem;font-weight:600;color:var(--text);}
.mm-country{font-size:0.58rem;font-weight:500;letter-spacing:0.1em;color:var(--muted);margin-top:4px;text-transform:uppercase;}
.mm-genre{display:inline-block;font-size:0.52rem;font-weight:500;letter-spacing:0.06em;color:var(--silver-dim);border:1px solid rgba(138,150,168,0.15);padding:2px 7px;border-radius:4px;margin-top:5px;}
#mm-close{align-self:flex-start;margin:0.6rem 0.6rem 0 0;background:none;border:1px solid var(--border);border-radius:5px;width:24px;height:24px;color:var(--muted);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;font-family:sans-serif;}
#mm-close:hover{color:var(--text);background:var(--surface2);}
.mm-body{padding:0.9rem 1.1rem 1rem;}
.mm-bio{font-size:0.83rem;font-weight:300;color:#6b7280;line-height:1.8;}
.mm-links{display:flex;gap:8px;margin-top:0.8rem;flex-wrap:wrap;}
.mm-yt-link{font-family:'Inter',sans-serif;font-size:0.7rem;font-weight:500;color:var(--gold);background:rgba(240,192,96,0.07);border:1px solid rgba(240,192,96,0.18);border-radius:5px;padding:5px 12px;text-decoration:none;transition:all 0.15s;}
.mm-yt-link:hover{background:rgba(240,192,96,0.14);}
.mm-yt-link.green{color:var(--green);background:var(--green-dim);border-color:rgba(34,197,94,0.22);}
.mm-yt-link.green:hover{background:rgba(34,197,94,0.18);}
#loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:0.85rem;letter-spacing:0.06em;}
@media(max-width:600px){
  html,body{overflow:hidden;}
  #app{display:block;position:fixed;inset:0;}
  #header{position:fixed;top:0;left:0;right:0;z-index:10;padding:0.5rem 0.8rem;gap:0.5rem;flex-wrap:nowrap;overflow:visible;height:44px;box-sizing:border-box;}
  .logo{flex-shrink:0;}
  .logo-title{font-size:0.95rem;white-space:nowrap;}
  .logo-sub{display:none;}
  #legend{display:none;}
  #era-badge{font-size:0.62rem;padding:3px 10px;white-space:nowrap;flex-shrink:0;margin-left:auto;}
  #timeline-wrap{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:0.5rem 1rem 1.8rem;box-sizing:border-box;}
  #era-markers{display:none;}
  #scrubber-track{height:48px;margin:0 14px;}
  #scrubber-handle{width:30px;height:30px;margin-top:-15px;}
  #year-tooltip{font-size:1rem;padding:4px 12px;}
  #map-wrap{position:fixed;top:44px;left:0;right:0;bottom:82px;overflow:hidden;background:var(--sea);}
  #modal{max-width:100%;border-radius:16px 16px 0 0;}
  #modal-backdrop{align-items:flex-end;padding:0;}
  .modal-body{padding:0.9rem 1.1rem;max-height:40vh;overflow-y:auto;}
  .m-bio{font-size:0.85rem;line-height:1.75;}
  .modal-media{padding:0.85rem 1.1rem;gap:8px;flex-wrap:wrap;}
  .listen-btn{font-size:0.78rem;padding:9px 18px;flex:1;text-align:center;}
  #minor-modal{max-width:100%;border-radius:16px 16px 0 0;}
  #minor-modal-backdrop{align-items:flex-end;padding:0;}
  .mm-body{padding:0.8rem 1rem 1rem;max-height:38vh;overflow-y:auto;}
  .mm-bio{font-size:0.82rem;line-height:1.75;color:#8a94a8;}
  .mm-links{margin-top:0.9rem;gap:8px;}
  .mm-yt-link{font-size:0.75rem;padding:8px 16px;flex:1;text-align:center;}
}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="logo">
      <span class="logo-title">Scandal & <em>Symphony</em></span>
      <span class="logo-sub">&nbsp;· 1600 – 2025</span>
    </div>
    <div style="display:flex;align-items:center;gap:14px;flex-shrink:0;">
      <div id="legend">
        <div class="legend-item"><div class="legend-dot major"></div>Major composers</div>
        <div class="legend-item"><div class="legend-dot minor"></div>Secondary composers</div>
      </div>
      <div id="era-badge">Early Baroque</div>
    </div>
  
  </div>
  <div id="map-wrap"><svg id="map-svg"></svg><div id="loading">Loading map...</div></div>
  <div id="timeline-wrap">
    <div id="era-markers"></div>
    <div id="scrubber-track">
      <div id="track-bg"></div><div id="track-eras"></div><div id="track-fill"></div>
      <div id="scrubber-handle"><div id="year-tooltip">1600</div></div>
    </div>
  </div>
</div>
<div id="modal-backdrop">
  <div id="modal">
    <div class="modal-header">
      <div class="modal-year-col">
        <div class="m-born-lbl">Born</div>
        <div class="m-year" id="m-year"></div>
        <div class="m-era-tag" id="m-era"></div>
      </div>
      <div class="modal-title-col">
        <div class="m-composer" id="m-name"></div>
        <div class="m-country" id="m-country"></div>
        <div class="m-genre" id="m-genre"></div>
      </div>
      <button id="m-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="modal-body"><p class="m-bio" id="m-bio"></p></div>
    <div class="modal-media">
      <a class="listen-btn green" id="spotify-btn" href="#" target="_blank" rel="noopener">&#9654; Spotify</a>
      <a class="listen-btn" id="yt-btn" href="#" target="_blank" rel="noopener">&#9654; YouTube</a>
    </div>
  </div>
</div>
<div id="minor-modal-backdrop">
  <div id="minor-modal">
    <div class="mm-header">
      <div class="mm-year-col">
        <div class="mm-born-lbl">Born</div>
        <div class="mm-year" id="mm-year"></div>
        <div class="mm-era" id="mm-era"></div>
      </div>
      <div class="mm-title-col">
        <div class="mm-name" id="mm-name"></div>
        <div class="mm-country" id="mm-country"></div>
        <div class="mm-genre" id="mm-genre"></div>
      </div>
      <button id="mm-close" onclick="closeMinorModal()">&#x2715;</button>
    </div>
    <div class="mm-body">
      <p class="mm-bio" id="mm-bio"></p>
      <div class="mm-links">
        <a class="mm-yt-link green" id="mm-spotify" href="#" target="_blank" rel="noopener">&#9654; Spotify</a>
        <a class="mm-yt-link" id="mm-yt" href="#" target="_blank" rel="noopener">&#9654; YouTube</a>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script>
const ERAS=[
  {name:"Early Baroque",start:1600,end:1649,color:"#92400e"},
  {name:"Baroque",start:1650,end:1749,color:"#b45309"},
  {name:"Classical",start:1750,end:1819,color:"#15803d"},
  {name:"Romantic",start:1820,end:1899,color:"#1d4ed8"},
  {name:"Late Romantic",start:1900,end:1939,color:"#6d28d9"},
  {name:"Modern",start:1940,end:1979,color:"#be185d"},
  {name:"Minimalist",start:1980,end:1999,color:"#0e7490"},
  {name:"Contemporary",start:2000,end:2025,color:"#374151"},
];
const START_YEAR=1600,END_YEAR=2025,SPAN=END_YEAR-START_YEAR;
function getEra(y){return ERAS.find(e=>y>=e.start&&y<=e.end)||ERAS[ERAS.length-1];}

const major=[
  {name:"Claudio Monteverdi",country:"Italy",iso:"ITA",born:1567,active:[1600,1643],era:"Early Baroque",genre:"Opera · Madrigal",lat:45.4,lon:10.9,bio:"The man who invented opera and accidentally created the entire Western musical tradition. L'Orfeo in 1607 was the first true opera. He survived plague, outlived most of his children, was sacked from the Mantua court in disgrace, and buried two wives. He was reportedly also a passionate, difficult, and demanding colleague. Without him there is no Mozart, no Verdi, no anything.",search:"Monteverdi L'Orfeo"},
  {name:"Jan Sweelinck",country:"Netherlands",iso:"NLD",born:1562,active:[1580,1621],era:"Early Baroque",genre:"Keyboard · Vocal",lat:52.4,lon:4.9,bio:"The greatest organist of the early Baroque who sat at the same organ in Amsterdam's Oude Kerk for 44 years and never left. Every important German organist of the next generation made the pilgrimage to learn from him. He taught them all, and they passed it to Bach, who passed it to Western music. He never needed to go anywhere because the world came to him.",search:"Sweelinck Fantasy in Echo"},
  {name:"Heinrich Schütz",country:"Germany",iso:"DEU",born:1585,active:[1611,1672],era:"Early Baroque",genre:"Sacred · Vocal",lat:51.1,lon:13.7,bio:"The most important German composer before Bach who imported the Italian Baroque revolution into Germany at his own expense. He paid for his own studies under Giovanni Gabrieli in Venice. He buried two wives, survived the Thirty Years War with most of his colleagues dead, and spent years writing furious letters to his employers complaining about his salary. The letters are genuinely funny. His music is extraordinary.",search:"Schutz Saul Saul"},
  {name:"Jean-Baptiste Lully",country:"France",iso:"FRA",born:1632,active:[1652,1687],era:"Baroque",genre:"Opera · Ballet",lat:48.9,lon:2.3,bio:"The most powerful and ruthless man in French music history. Born Italian, charmed his way into Louis XIV's court by entertaining the king with his violin playing, then used royal patronage to destroy every competitor. He held a literal legal monopoly on opera in France. He also had a long-running affair with a male page that caused a scandal even the Sun King struggled to manage. His death was spectacular: conducting with a long staff, he stabbed his own foot, refused amputation out of vanity, got gangrene, and died.",search:"Lully Armide"},
  {name:"Henry Purcell",country:"England",iso:"GBR",born:1659,active:[1679,1695],era:"Baroque",genre:"Opera · Sacred · Theatre",lat:51.5,lon:-0.1,bio:"England's greatest composer died at 36 possibly because his wife locked him out of the house after a late night at the tavern and he caught a fatal chill. This is disputed -- it may have been tuberculosis -- but his wife was reportedly furious either way. Dido's Lament is one of the most heartbreaking pieces ever written. The gap he left in English music lasted 200 years and arguably never fully closed.",search:"Purcell Dido's Lament"},
  {name:"François Couperin",country:"France",iso:"FRA",born:1668,active:[1685,1730],era:"Baroque",genre:"Keyboard · Chamber",lat:48.8,lon:2.2,bio:"The most aristocratic keyboard composer in history who published an entire treatise on exactly how his pieces should be performed because he was convinced everybody was getting them wrong. He was right. The treatise is precise to the point of obsession. Bach studied him obsessively and practically nobody else acknowledged the debt. Couperin noticed.",search:"Couperin Les Barricades Mysterieuses"},
  {name:"Antonio Vivaldi",country:"Italy",iso:"ITA",born:1678,active:[1703,1741],era:"Baroque",genre:"Concerto · Opera",lat:45.4,lon:12.3,bio:"The Red Priest of Venice -- ordained, then immediately stopped saying Mass claiming chest problems that never seemed to affect his conducting. He spent decades at a Venetian orphanage for illegitimate girls turning out over 500 concertos. He also had a long and ambiguous relationship with his former student Anna Giro, whom he travelled everywhere with, which the Church investigated twice. He died absolutely broke in Vienna in a pauper's grave while trying to sell his manuscripts.",search:"Vivaldi Four Seasons"},
  {name:"Johann Sebastian Bach",country:"Germany",iso:"DEU",born:1685,active:[1703,1750],era:"Baroque",genre:"Counterpoint · Sacred",lat:51.3,lon:12.4,bio:"The supreme master of Western music and almost entirely unknown outside Germany in his lifetime. He had 20 children with two wives. His first wife died suddenly while he was away and he came home to find her buried. He was imprisoned for a month for resigning a job without permission. He spent decades in bitter public dispute with the Leipzig city authorities who called him uncooperative and arrogant. He was. He also played the organ so hard he wore the pedals down to the wood.",search:"Bach Brandenburg Concertos"},
  {name:"George F. Handel",country:"Germany · England",iso:"DEU",born:1685,active:[1706,1759],era:"Baroque",genre:"Opera · Oratorio",lat:51.5,lon:13.4,bio:"The greatest showman of the Baroque era. He went bankrupt twice. He had a genuine physical fight with a soprano during a rehearsal, grabbing her and threatening to drop her out of a window. His relationship with the castrato Senesino involved screaming public rows followed by artistic reconciliations. He reinvented himself at 52 by abandoning opera for oratorios. Messiah was written in 24 days. When he heard it performed he reportedly wept.",search:"Handel Messiah Hallelujah"},
  {name:"Domenico Scarlatti",country:"Italy · Spain",iso:"ITA",born:1685,active:[1705,1757],era:"Baroque",genre:"Keyboard · Sonata",lat:40.8,lon:14.2,bio:"One of three great composers born in 1685 alongside Bach and Handel, and the most underrated. He had a legendary keyboard duel with Handel in Rome in 1708 -- Handel won on the organ, Scarlatti on harpsichord, and they became lifelong friends. He later followed a Portuguese princess to Spain, spent 25 years there in comfortable obscurity, wrote 555 extraordinary sonatas, got very fat, and gambled his salary away compulsively.",search:"Scarlatti Keyboard Sonata K141"},
  {name:"Joseph Haydn",country:"Austria",iso:"AUT",born:1732,active:[1757,1809],era:"Classical",genre:"Symphony · String Quartet",lat:47.8,lon:16.5,bio:"The father of the symphony who spent 30 years as a glorified servant to the Esterhazy princes, wearing a uniform and needing written permission to leave the estate. He had an utterly miserable arranged marriage: his wife was reportedly cold, difficult, and used his manuscripts as hair-curling papers. His real love was a soprano he could never marry. Despite all this he remained constitutionally cheerful. He invented the symphony and the string quartet essentially from scratch. Mozart called him the greatest composer alive.",search:"Haydn Symphony 94 Surprise"},
  {name:"Wolfgang A. Mozart",country:"Austria",iso:"AUT",born:1756,active:[1762,1791],era:"Classical",genre:"Opera · Symphony · Concerto",lat:47.8,lon:13.0,bio:"The most naturally gifted composer in history and one of its greatest tragedies. His father exploited him from infancy as a performing freak, dragging him across Europe in freezing carriages. He was literally kicked out of the Archbishop of Salzburg's office. He wrote extraordinarily obscene letters to his cousin. He died at 35, penniless, in disputed circumstances -- poisoning was rumoured immediately -- and was buried in an unmarked pauper's grave. In 35 years he produced Don Giovanni, The Magic Flute, the Jupiter Symphony, and the Requiem he was unable to finish.",search:"Mozart Symphony No 40"},
  {name:"C.P.E. Bach",country:"Germany",iso:"DEU",born:1714,active:[1740,1788],era:"Classical",genre:"Keyboard · Symphony",lat:53.6,lon:10.0,bio:"Johann Sebastian's son who in the 18th century was considerably more famous than his father. He spent 28 miserable years working for Frederick the Great in Berlin -- a ruler who only wanted flute music and was indifferent to everything else. He described the period as the most musically frustrating of his life. Haydn, Mozart, and Beethoven all said they owed him more than anyone else. He finally escaped to Hamburg at 48 and spent the rest of his career in freedom.",search:"CPE Bach Keyboard Sonata"},
  {name:"Christoph W. Gluck",country:"Germany",iso:"DEU",born:1714,active:[1741,1787],era:"Classical",genre:"Opera",lat:48.8,lon:11.5,bio:"The opera reformer who declared open war on the Baroque tradition and won. In Paris he was at the centre of one of the most violent musical controversies of the century -- his supporters and Piccinni's supporters had public arguments that occasionally turned physical. Marie Antoinette had been his pupil as a girl and backed him personally. The anti-Gluck faction called this shameless patronage. They were not entirely wrong.",search:"Gluck Orfeo ed Euridice"},
  {name:"Luigi Boccherini",country:"Italy",iso:"ITA",born:1743,active:[1760,1805],era:"Classical",genre:"Chamber · Symphony",lat:43.8,lon:11.2,bio:"The cellist-composer whose Spanish patron, a Prussian ambassador, kept altering the tempos and dynamics of his compositions without permission. Boccherini reportedly told him to his face that he had absolutely no right to change the music. The nobleman dismissed him on the spot. He spent his final years in Madrid poverty, having outlived his wife and three of his five children. His Minuet is one of the most instantly recognisable pieces ever written and he would have found this fame bitterly ironic.",search:"Boccherini Minuet"},
  {name:"Ludwig van Beethoven",country:"Germany",iso:"DEU",born:1770,active:[1792,1827],era:"Romantic",genre:"Symphony · Sonata · Chamber",lat:50.7,lon:7.1,bio:"The most important composer in history and one of the most genuinely difficult humans who ever lived. He threw a plate of food at a waiter. He waged a legal battle to defraud his own nephew out of his inheritance. He wrote an anguished love letter to a mystery woman he called the Immortal Beloved -- historians have argued for 200 years about who she was. He went deaf in his late twenties and wrote the Ninth Symphony in total silence. He had over 40 different addresses in Vienna because he kept getting evicted for impossible behaviour.",search:"Beethoven Symphony No 9"},
  {name:"Franz Schubert",country:"Austria",iso:"AUT",born:1797,active:[1814,1828],era:"Romantic",genre:"Lied · Chamber · Symphony",lat:48.2,lon:16.4,bio:"Schubert contracted syphilis at 25, knew he was dying, and produced some of the most devastating music in the Western tradition in the six years he had left. He was so obscure in Vienna that his funeral had more attendees than most of his actual concerts. He died a year after Beethoven, whom he had worshipped from a distance but barely knew, and was buried next to him at his own request. He was 31.",search:"Schubert Winterreise"},
  {name:"Frédéric Chopin",country:"Poland",iso:"POL",born:1810,active:[1829,1849],era:"Romantic",genre:"Piano",lat:52.2,lon:21.0,bio:"The poet of the piano who lived one of the great romantic scandals of his century. His nine-year affair with George Sand -- a woman who wore men's clothes, smoked cigars publicly, and had already destroyed several men before him -- was the talk of Europe. She essentially managed his life while he was slowly dying of tuberculosis. Their breakup was ugly and disputed: she said he ended it from delusion; he said she abandoned him when he needed her most. He never went home to Poland.",search:"Chopin Nocturne Op 9 No 2"},
  {name:"Robert Schumann",country:"Germany",iso:"DEU",born:1810,active:[1830,1856],era:"Romantic",genre:"Piano · Lied · Symphonic",lat:50.8,lon:12.9,bio:"One of the great Romantic voices who permanently damaged his right hand trying to build a mechanical finger-stretching device. He began hearing a sustained high A in his head constantly, before throwing himself into the Rhine. He spent his last two years in an asylum outside Bonn. Brahms visited him regularly during that time -- almost certainly in love with Clara, Schumann's wife. Clara, who was also one of the finest pianists in Europe, never went to see her husband once he was committed.",search:"Schumann Piano Concerto"},
  {name:"Franz Liszt",country:"Hungary",iso:"HUN",born:1811,active:[1838,1886],era:"Romantic",genre:"Piano · Symphonic",lat:47.5,lon:19.0,bio:"The first rock star in history. Women threw their gloves, jewellery, and hair to him on stage. He collected broken piano strings as souvenirs. He had a catastrophic public affair with a married countess, then a decade-long relationship with a princess whose divorce the Pope personally refused to grant. He eventually took minor holy orders and became the Abbé Liszt, which seemed to make him more attractive to women, not less. He reportedly found this amusing.",search:"Liszt Piano Sonata B minor"},
  {name:"Richard Wagner",country:"Germany",iso:"DEU",born:1813,active:[1836,1883],era:"Romantic",genre:"Music Drama",lat:51.3,lon:12.4,bio:"The most controversial composer in history and one of its least sympathetic personalities. He fled Germany after supporting a failed revolution, spent years in exile, and was an unrepentant anti-Semite. He conducted an affair with Cosima von Bülow -- his closest friend's wife -- while living in his house on his charity. That friend, Hans von Bülow, discovered the affair and then personally conducted the premiere of Wagner's Tristan and Isolde. Wagner and Cosima had three children together before von Bülow finally granted the divorce.",search:"Wagner Ride of the Valkyries"},
  {name:"Giuseppe Verdi",country:"Italy",iso:"ITA",born:1813,active:[1839,1901],era:"Romantic",genre:"Opera",lat:44.9,lon:10.1,bio:"The dominant force in Italian opera and the country's unofficial political saint. His name became a coded political chant -- Viva VERDI stood for Vittorio Emmanuele Re D'Italia, which the Austrian censors couldn't suppress without banning praise of a composer. He had a 15-year open relationship with the soprano Giuseppina Strepponi that scandalised conservative rural Italy. He kept farming his land at Busseto and ignored all criticism. He wrote his greatest comic opera, Falstaff, at 79.",search:"Verdi La Traviata"},
  {name:"Bedřich Smetana",country:"Czech Republic",iso:"CZE",born:1824,active:[1848,1884],era:"Romantic",genre:"Symphonic Poem · Opera",lat:50.1,lon:14.4,bio:"The father of Czech music who composed his most important works in total deafness caused by syphilis. He described the constant high-pitched ringing in his ears in agonising detail in his diaries. He died in a lunatic asylum in 1884. Vltava -- his portrait of the Bohemian river -- became one of the best-loved orchestral pieces of the 19th century and is now the unofficial Czech national anthem.",search:"Smetana Vltava"},
  {name:"Johannes Brahms",country:"Germany",iso:"DEU",born:1833,active:[1854,1897],era:"Romantic",genre:"Symphony · Chamber · Lied",lat:53.6,lon:10.0,bio:"The great Classical Romantic who spent 40 years in love with someone else's wife. Clara Schumann was the most celebrated female pianist in Europe when Brahms met her at 20, already married to Robert. When Robert went mad and was committed, Brahms was in the house, devoted to both of them. He remained close to Clara for the rest of his life. He was also famously abrasive: he once excused himself from a dinner party by saying, if there is anyone here I have not insulted, I apologise.",search:"Brahms Symphony 4"},
  {name:"Camille Saint-Saëns",country:"France",iso:"FRA",born:1835,active:[1853,1921],era:"Romantic",genre:"Concerto · Orchestral",lat:48.9,lon:2.3,bio:"A prodigy who lived to 86 and became the most acidic personality in French musical life. He walked out of the premiere of Stravinsky's Rite of Spring in 1913 loudly complaining about the bassoon writing -- technically correct, spectacularly ill-judged. After his two young sons died within weeks of each other he abandoned his wife without warning or explanation in a Swiss hotel and was never reconciled with her. He spent his final years in Algiers trying to escape the Parisian musical establishment.",search:"Saint-Saens Symphony No 3 Organ"},
  {name:"Edvard Grieg",country:"Norway",iso:"NOR",born:1843,active:[1865,1907],era:"Romantic",genre:"Piano · Orchestral",lat:60.4,lon:5.3,bio:"The voice of Norwegian Romanticism who married his first cousin Nina. Their parents were appalled. The marriage lasted 47 years. His Piano Concerto was written at 25 and made him immediately famous; he then spent the rest of his life slightly haunted by it, never quite escaping its shadow. He was a fierce Norwegian nationalist at a time when Norway was under Swedish rule, which made Finlandia look mild by comparison.",search:"Grieg Piano Concerto"},
  {name:"Antonín Dvořák",country:"Czech Republic",iso:"CZE",born:1841,active:[1862,1904],era:"Romantic",genre:"Symphony · Chamber",lat:50.1,lon:14.8,bio:"The most loveable major composer. He was obsessed with trains and pigeons in equal measure -- he visited railway stations for relaxation and kept a pigeon loft he tended personally. He went to New York as director of the National Conservatory and was completely, embarrassingly homesick from the first week. He wrote the New World Symphony there, longing for Bohemia, and went home as soon as his contract allowed. He brought the pigeons with him.",search:"Dvorak New World Symphony"},
  {name:"Pyotr I. Tchaikovsky",country:"Russia",iso:"RUS",born:1840,active:[1866,1893],era:"Romantic",genre:"Ballet · Symphony · Opera",lat:55.8,lon:37.6,bio:"Russia's most beloved composer and one of its most tormented human beings. He was gay in an era when this could destroy him and spent his life in terror of exposure. He entered a catastrophically ill-judged marriage to conceal it; it lasted nine weeks before he tried to commit suicide by standing in the Moscow river hoping to catch pneumonia. He survived. He then had a 14-year epistolary relationship with a wealthy widow who funded him on the sole condition they never meet. They accidentally met once at a concert. Both pretended it had not happened.",search:"Tchaikovsky Swan Lake"},
  {name:"Modest Mussorgsky",country:"Russia",iso:"RUS",born:1839,active:[1858,1881],era:"Romantic",genre:"Opera · Piano",lat:55.8,lon:37.6,bio:"The most original and self-destructive of the Russian nationalists. A talented military officer who gave it all up for music, he descended into alcoholism that became progressively worse through his forties. His colleagues dismissed his greatest works as rough and unfinished. Rimsky-Korsakov spent years after his death polishing and correcting the scores, very possibly changing them more than he should have. Mussorgsky died at 42. Pictures at an Exhibition was written in three weeks.",search:"Mussorgsky Pictures at an Exhibition"},
  {name:"N. Rimsky-Korsakov",country:"Russia",iso:"RUS",born:1844,active:[1865,1908],era:"Romantic",genre:"Opera · Orchestral",lat:59.9,lon:30.3,bio:"The master orchestrator who was appointed Professor of Composition at the St Petersburg Conservatory with absolutely no formal training in the subject. He spent years secretly teaching himself everything he was supposed to be teaching his students, staying one lesson ahead. He fired Stravinsky from his class and then became his most important mentor. He also heavily edited Mussorgsky's unfinished scores, which Shostakovich later re-edited back closer to the originals, implying Rimsky had been too free with his corrections.",search:"Rimsky-Korsakov Scheherazade"},
  {name:"César Franck",country:"Belgium",iso:"BEL",born:1822,active:[1842,1890],era:"Romantic",genre:"Organ · Symphony · Chamber",lat:50.9,lon:4.4,bio:"Belgian-born, Parisian by life, organist by vocation and temperament. He wrote his Symphony in D minor at 67 and was genuinely baffled by its cool reception in Paris. He died after being struck by a horse-drawn omnibus. His students adored him with an almost religious devotion. The Parisian musical establishment largely ignored him throughout his life. Debussy was one of his pupils, though you would struggle to hear the influence.",search:"Cesar Franck Symphony D minor"},
  {name:"Giacomo Puccini",country:"Italy",iso:"ITA",born:1858,active:[1884,1924],era:"Late Romantic",genre:"Opera",lat:43.8,lon:10.5,bio:"The last great Italian opera composer and a man whose personal life was genuinely scandalous. His wife became convinced their young servant Doria Manfredi was having an affair with Puccini. Almost certainly false. The wife's relentless accusations drove Doria to suicide. Doria's family sued Puccini's wife for defamation and won a substantial settlement -- which Puccini reportedly paid out of guilt. He died of throat cancer while composing Turandot, which was completed by a student from sketches and premiered with the conductor stopping at the point where Puccini had stopped.",search:"Puccini Nessun Dorma"},
  {name:"Isaac Albéniz",country:"Spain",iso:"ESP",born:1860,active:[1880,1909],era:"Romantic",genre:"Piano",lat:41.4,lon:2.2,bio:"A child prodigy who ran away from home aged ten to give solo concerts, stowed away on a ship to Puerto Rico, and busked his way across the Americas before his parents tracked him down. He later studied with Liszt, who was astonished by him. He wrote the piano suite Iberia -- arguably the greatest work ever written for solo piano about a country -- while dying of Bright's disease in constant pain, finishing the final piece weeks before his death at 48.",search:"Albeniz Asturias"},
  {name:"Jean Sibelius",country:"Finland",iso:"FIN",born:1865,active:[1889,1926],era:"Romantic",genre:"Symphony · Symphonic Poem",lat:60.2,lon:24.9,bio:"Finland's national composer who spent the last 30 years of his life writing absolutely nothing. He destroyed the manuscript of his Eighth Symphony in a bonfire in the 1940s. No one knows why. He was a serious alcoholic for much of his adult life. Finlandia was so politically explosive under Russian occupation that it was performed under assumed names to avoid being banned. He lived in his villa outside Helsinki until he was 91, receiving visitors, giving occasional interviews, and producing nothing.",search:"Sibelius Finlandia"},
  {name:"Carl Nielsen",country:"Denmark",iso:"DNK",born:1865,active:[1892,1931],era:"Romantic",genre:"Symphony · Concerto",lat:55.7,lon:12.6,bio:"Denmark's most important composer, almost entirely ignored outside Scandinavia for most of his life. His marriage was turbulent: his wife was an independent sculptor who frequently left him. His Fourth Symphony, The Inextinguishable, ends with two timpanists placed on opposite sides of the stage, battling each other. He wrote it during the First World War and believed music represented the inextinguishable will to live. It is Denmark's greatest musical export.",search:"Nielsen Symphony No 4 Inextinguishable"},
  {name:"Edward Elgar",country:"England",iso:"GBR",born:1857,active:[1890,1934],era:"Late Romantic",genre:"Orchestral · Choral",lat:52.2,lon:-2.2,bio:"The first major English composer since Purcell and the most enigmatic personality in British musical history. The Enigma Variations has a hidden theme running through it that nobody has definitively identified in 125 years. The 14th variation is dedicated to someone referred to only as *** whose identity Elgar refused to reveal. The Cello Concerto was savaged at its premiere after a disastrous final rehearsal and Elgar, devastated, essentially stopped composing for the last 15 years of his life.",search:"Elgar Cello Concerto"},
  {name:"Gustav Mahler",country:"Austria",iso:"AUT",born:1860,active:[1880,1911],era:"Late Romantic",genre:"Symphony · Song Cycle",lat:48.2,lon:16.4,bio:"The last great Romantic symphonist and one of music's most psychologically complex figures. His wife Alma was conducting simultaneous affairs with the architect Walter Gropius and the painter Oskar Kokoschka while married to him. When Gropius accidentally sent a love letter directly to Mahler, Mahler had a complete breakdown and sought out Sigmund Freud for a single emergency session -- a famous four-hour walk through the streets of Leiden. His Ninth Symphony is widely understood as a farewell to life. He died the following year.",search:"Mahler Symphony No 5 Adagietto"},
  {name:"Richard Strauss",country:"Germany",iso:"DEU",born:1864,active:[1885,1949],era:"Late Romantic",genre:"Tone Poem · Opera",lat:48.1,lon:11.6,bio:"The last of the great German Romantics who made the catastrophic decision to remain in Germany under the Nazis and accept the position of Reich Music President. His motivations remain disputed -- he had a Jewish daughter-in-law and Jewish grandchildren he was protecting under his name. It worked: they survived. He was denazified after the war. The Four Last Songs, written at 84 for his wife Pauline -- who had been difficult, demanding, and absolutely devoted for 55 years -- are among the most beautiful pieces ever composed.",search:"Richard Strauss Four Last Songs"},
  {name:"Claude Debussy",country:"France",iso:"FRA",born:1862,active:[1884,1918],era:"Late Romantic",genre:"Impressionist",lat:48.9,lon:2.3,bio:"The inventor of musical Impressionism whose personal life was a procession of catastrophes largely of his own making. He left his first wife Gaby for another woman; Gaby shot herself in the street and survived. He left his second mistress Thérèse for his wife Lilly; Lilly also shot herself in the street and also survived, though with permanent damage. He died of colon cancer in 1918 while German shells were falling on Paris. Clair de Lune is the most streamed classical piece on Spotify.",search:"Debussy Clair de Lune"},
  {name:"Maurice Ravel",country:"France",iso:"FRA",born:1875,active:[1895,1937],era:"Late Romantic",genre:"Orchestral · Piano",lat:48.9,lon:2.4,bio:"The Swiss watchmaker of French music: precise, controlled, technically perfect, and deeply mysterious as a person. He was impeccably dressed at all times. He never had a known romantic relationship of any kind. Bolero was sketched in 15 minutes as a deliberate exercise in formal constraint and became the most performed orchestral piece in history; he found this mortifying and said it was not really music at all. In his final years a progressive neurological condition meant he could hear finished music in his head but could no longer write it down. He died after a botched brain operation in 1937.",search:"Ravel Bolero"},
  {name:"Sergei Rachmaninoff",country:"Russia",iso:"RUS",born:1873,active:[1892,1943],era:"Late Romantic",genre:"Piano · Symphonic",lat:55.8,lon:37.6,bio:"The last great Romantic who nearly gave up composing entirely. His First Symphony premiere was a catastrophe -- the conductor was allegedly drunk -- and the reviews were so savage Rachmaninoff had a complete breakdown for three years. He entered psychotherapy with a specialist in hypnosis, seeing him daily for months. The therapy worked: the result was the Second Piano Concerto, dedicated to the therapist. He left Russia after the revolution, became enormously famous, and spent the rest of his life profoundly homesick for a country that no longer existed.",search:"Rachmaninoff Piano Concerto No 2"},
  {name:"Ralph Vaughan Williams",country:"England",iso:"GBR",born:1872,active:[1903,1958],era:"Late Romantic",genre:"Symphony · Orchestral",lat:51.5,lon:-0.1,bio:"The architect of the English musical renaissance who was still writing major works at 85. His first wife Adeline was bedridden for decades with arthritis and he cared for her until her death. Six weeks later he married his much younger muse Ursula. The Lark Ascending was composed in 1914 just before the First World War and its extraordinary pastoral serenity makes it almost unbearable with hindsight. It has topped UK classical music polls for over 15 years running.",search:"Vaughan Williams The Lark Ascending"},
  {name:"Manuel de Falla",country:"Spain",iso:"ESP",born:1876,active:[1905,1946],era:"Late Romantic",genre:"Ballet · Orchestral",lat:40.4,lon:-3.7,bio:"The defining figure of Spanish music who spent his final 11 years in a small Argentine village, never finishing his grand final work. He had left Spain after the Civil War when his close friend Federico García Lorca was executed by Franco's forces -- taken from his home and shot. Falla worked on the vast cantata Atlantida for the rest of his life without completing it, increasingly withdrawn, dying in Alta Gracia in 1946 with a profound sense of everything that had been lost.",search:"Manuel de Falla El Amor Brujo"},
  {name:"Béla Bartók",country:"Hungary",iso:"HUN",born:1881,active:[1903,1945],era:"Modern",genre:"Orchestra · String Quartet",lat:47.5,lon:19.0,bio:"One of the most important composers of the 20th century who spent his final years in poverty in New York. He left Hungary in protest at fascism and arrived in America with essentially no income, no connections, and failing health. He was also one of the first ethnomusicologists, spending years before the war recording Hungarian and Romanian folk music on wax cylinders in remote villages. He died of leukaemia in 1945. ASCAP sent him a cheque for 100 dollars at the end. It was more than he had earned from music in years.",search:"Bartok Concerto for Orchestra"},
  {name:"Igor Stravinsky",country:"Russia · France",iso:"RUS",born:1882,active:[1907,1971],era:"Modern",genre:"Ballet · Neo-Classical",lat:55.8,lon:37.6,bio:"The most influential and stylistically mercurial composer of the 20th century. The Rite of Spring caused a genuine riot at its Paris premiere in 1913 -- fighting in the stalls, screaming and whistling in the galleries, Nijinsky shouting counts from the wings, and Stravinsky watching from the wings before fleeing. He also had an affair with Coco Chanel that she later claimed was more serious than he acknowledged. His creative and personal relationship with Diaghilev was the most explosively productive partnership in 20th century art.",search:"Stravinsky Rite of Spring"},
  {name:"Arnold Schoenberg",country:"Austria",iso:"AUT",born:1874,active:[1899,1951],era:"Modern",genre:"Atonal · Twelve-Tone",lat:48.2,lon:16.4,bio:"The most radical composer in history who abandoned tonality, split the musical world in two permanently, and attracted lifelong hatred from a large portion of it. His wife left him for a painter who then shot himself. Schoenberg was a serious painter whose self-portraits are genuinely unsettling. He fled the Nazis to Los Angeles, became neighbours with George Gershwin, and played tennis with Charlie Chaplin. He was so superstitious about the number 13 that he changed the spelling of his opera Moses und Aron to avoid 13 letters in the title.",search:"Schoenberg Verklarte Nacht"},
  {name:"Leoš Janáček",country:"Czech Republic",iso:"CZE",born:1854,active:[1904,1928],era:"Modern",genre:"Opera · Chamber",lat:49.2,lon:16.6,bio:"The most radical Czech composer who wrote his greatest works after the age of 60. He was obsessively, consuming in love with Kamila Stösslová -- a married woman 38 years younger -- for the last 12 years of his life. He wrote her over 700 letters. She appears to have tolerated rather than reciprocated the obsession, though she inspired his late operas, which are among the greatest of the 20th century. He died of pneumonia at 74 after getting lost in the woods near her home while looking for her son.",search:"Janacek Sinfonietta"},
  {name:"Dmitri Shostakovich",country:"Russia",iso:"RUS",born:1906,active:[1926,1975],era:"Modern",genre:"Symphony · Chamber",lat:55.8,lon:37.6,bio:"The greatest composer of the Soviet era who lived in constant terror of Stalin. Stalin personally crossed his name off an enemies list at one point, which meant he was temporarily safe. After his opera Lady Macbeth of Mtsensk was denounced in Pravda -- reportedly after Stalin himself walked out -- Shostakovich packed a bag every night expecting arrest. His Fifth Symphony is either a sincere tribute to Soviet power or a devastating sarcastic rebuke of it. That irresolvable ambiguity was the only protection he had.",search:"Shostakovich Symphony No 5"},
  {name:"Benjamin Britten",country:"England",iso:"GBR",born:1913,active:[1937,1976],era:"Modern",genre:"Opera · Orchestral · Vocal",lat:52.2,lon:1.6,bio:"The dominant figure in 20th century British music who was gay when this was a criminal offence in England. His lifelong partner Peter Pears was a tenor; Britten wrote most of his greatest vocal works for him. Their relationship was an open secret in musical circles for decades before decriminalisation. Britten refused a knighthood for years before accepting a life peerage on his deathbed, which he didn't live to take up. Peter Grimes is the opera that announced British music's return to the world stage after 200 years.",search:"Britten War Requiem"},
  {name:"Olivier Messiaen",country:"France",iso:"FRA",born:1908,active:[1929,1992],era:"Modern",genre:"Organ · Orchestral · Piano",lat:48.9,lon:2.3,bio:"The great mystic of 20th century music who wrote one of its most extraordinary works in a German prisoner of war camp. The Quartet for the End of Time was premiered in January 1941 in a freezing Silesian barracks before guards and fellow prisoners, on instruments with broken strings and missing keys. Messiaen experienced synaesthesia -- he literally saw colours when he heard music -- and spent his life incorporating Hindu rhythms, birdsong, and deep Catholic theology into a musical language entirely his own.",search:"Messiaen Quartet for the End of Time"},
  {name:"György Ligeti",country:"Hungary · Austria",iso:"HUN",born:1923,active:[1953,2006],era:"Modern",genre:"Orchestral · Piano · Chamber",lat:47.5,lon:19.0,bio:"The supreme modernist who smuggled his scores out of Hungary wrapped inside loaves of bread when he fled in 1956. He invented micropolyphony: dense clouds of voices moving independently to create a completely new sound world. Stanley Kubrick used his music in 2001: A Space Odyssey, The Shining, and Eyes Wide Shut without permission, without payment, and without telling him. The legal dispute lasted years. His Piano Etudes are among the most difficult pieces ever written; he reportedly watched pianists struggle with them with quiet satisfaction.",search:"Ligeti Atmospheres"},
  {name:"Krzysztof Penderecki",country:"Poland",iso:"POL",born:1933,active:[1959,2020],era:"Modern",genre:"Orchestral · Choral",lat:50.1,lon:19.9,bio:"One of the most startling voices of the post-war avant-garde who later became deeply conservative and was attacked for it by both camps simultaneously. Threnody for the Victims of Hiroshima had no title at first -- he called it 8'37'' after its duration. When he heard it performed and was moved by it, he renamed it. Kubrick used it in The Shining. His former avant-garde allies condemned his turn to Romanticism; he described their criticism as the most unpleasant sound he had ever heard.",search:"Penderecki Threnody for the Victims of Hiroshima"},
  {name:"Henryk Górecki",country:"Poland",iso:"POL",born:1933,active:[1958,2010],era:"Modern",genre:"Choral · Symphonic",lat:50.3,lon:18.7,bio:"A composer almost nobody knew who accidentally became a global phenomenon. Symphony No.3 -- the Symphony of Sorrowful Songs -- sat largely unperformed for years after its 1977 premiere. Then a 1992 recording sold over a million copies. It spent 40 weeks on the UK pop charts. Górecki was reportedly bewildered by the attention, uncertain whether he approved of all his new listeners, and somewhat suspicious that something had gone wrong.",search:"Gorecki Symphony No 3"},
  {name:"Sofia Gubaidulina",country:"Russia",iso:"RUS",born:1931,active:[1965,2025],era:"Modern",genre:"Chamber · Orchestral · Sacred",lat:55.8,lon:37.6,bio:"One of the great living composers who was told by Shostakovich himself, during the depths of Soviet suppression, to continue on her so-called mistaken path. She was part of an unofficial trio of Soviet composers working outside official approval. She joined an improvisation ensemble that played balalaika, wine glasses, and found objects. She is now in her nineties and still composing with extraordinary intensity.",search:"Gubaidulina Offertorium"},
  {name:"Alfred Schnittke",country:"Russia",iso:"RUS",born:1934,active:[1960,1998],era:"Modern",genre:"Polystylistic · Orchestra",lat:55.8,lon:37.5,bio:"The master of polystylism who collided musical styles from different centuries to devastating effect and paid a severe physical price for the stress of living in the Soviet Union. He had a series of strokes from 1985 that left him partially paralysed and affected his speech. He continued composing until months before his death in 1998. His First Symphony was banned by Soviet authorities after its chaotic, provocative premiere. He described his method as transforming kitsch into its opposite through the weight of its surroundings.",search:"Schnittke Concerto Grosso No 1"},
  {name:"Arvo Pärt",country:"Estonia",iso:"EST",born:1935,active:[1976,2025],era:"Minimalist",genre:"Sacred · Choral · Chamber",lat:59.4,lon:24.7,bio:"The most performed living classical composer who invented an entirely new musical language after eight years of complete silence. He spent the late 1960s and early 1970s listening to Gregorian chant and Renaissance polyphony and then emerged with tintinnabuli -- a method of crystalline, bell-like simplicity he described as finding nourishment in a single note. He left Estonia under Soviet pressure in 1980 and lived in Berlin for decades. His music sounds like it has always existed.",search:"Arvo Part Spiegel im Spiegel"},
  {name:"John Tavener",country:"England",iso:"GBR",born:1944,active:[1968,2013],era:"Minimalist",genre:"Sacred · Choral",lat:51.5,lon:-0.1,bio:"Song for Athene performed at Princess Diana's funeral in 1997 made him the most suddenly famous British composer since Elgar, in circumstances nobody had anticipated. He converted to Russian Orthodoxy in 1977, which transformed his musical language entirely. He had been signed to Apple Records by the Beatles in the 1960s; George Harrison remained a devoted friend and patron until his death, and Tavener was at his bedside at the end.",search:"Tavener Song for Athene"},
  {name:"Ennio Morricone",country:"Italy",iso:"ITA",born:1928,active:[1961,2020],era:"Contemporary",genre:"Film Music · Orchestral",lat:41.9,lon:12.5,bio:"The greatest film composer in history who was nominated for an Academy Award five times over 40 years before finally winning at 87 for The Hateful Eight. His score for The Good the Bad and the Ugly -- human whistles, twangy guitar, gunshots, and coyote wails -- invented a sonic language so original it became the sound of an entire genre. He and Sergio Leone had been classmates at school at the age of eight. He also spent decades writing serious avant-garde music under a pseudonym, which he considered his real work.",search:"Ennio Morricone The Good The Bad And The Ugly"},
  {name:"Kaija Saariaho",country:"Finland",iso:"FIN",born:1952,active:[1980,2023],era:"Contemporary",genre:"Opera · Orchestral · Electronic",lat:60.2,lon:24.9,bio:"The most celebrated Finnish composer of her generation who left Helsinki for Paris in 1982 to work at IRCAM and never returned to live in Finland. L'Amour de loin, her first opera, premiered at Salzburg in 2000 to extraordinary acclaim. She was diagnosed with a brain tumour in 2021 and continued composing until close to her death in 2023. Her final opera Innocence -- dealing with a school shooting and its aftermath across multiple languages -- was called one of the most important new operas in decades.",search:"Kaija Saariaho L'Amour de Loin"},
  {name:"Valentin Silvestrov",country:"Ukraine",iso:"UKR",born:1937,active:[1970,2025],era:"Contemporary",genre:"Symphony · Chamber · Song",lat:50.5,lon:30.5,bio:"Ukraine's greatest living composer who fled Kyiv for Berlin after Russia's full-scale invasion in February 2022. He is in his late eighties. He had lost his wife Larissa, his lifelong companion, in 2020, and composed his Requiem for her. Since the invasion his music has taken on an almost unbearable resonance for audiences around the world.",search:"Valentin Silvestrov Bagatelle"},
  {name:"Max Richter",country:"Germany · England",iso:"DEU",born:1966,active:[2002,2025],era:"Contemporary",genre:"Neo-Classical · Film",lat:51.5,lon:-0.1,bio:"The composer who made neo-classical music a mainstream cultural phenomenon. Sleep -- an eight-hour lullaby intended to be listened to unconscious -- was performed live at the Wellcome Collection with audiences sleeping in beds. He recomposed Vivaldi's Four Seasons from scratch, keeping roughly 25% of the original material, and the result streams over a billion times a year. He describes it as a letter of love to a piece he found had become invisible through familiarity.",search:"Max Richter On The Nature of Daylight"},
  {name:"Nils Frahm",country:"Germany",iso:"DEU",born:1982,active:[2009,2025],era:"Contemporary",genre:"Neo-Classical · Electronic",lat:52.5,lon:13.4,bio:"The Berlin composer who made the piano feel new again. He grew up studying with a pupil of a pupil of Tchaikovsky -- a direct line through musical history. He records in a studio in Berlin using prepared pianos and layered electronics. Spaces was recorded in a church on Christmas Day. His 2018 Barbican concert -- a single 90-minute continuous piece performed to a sold-out crowd -- was filmed and watched by millions who had never previously been interested in piano music.",search:"Nils Frahm Says"},
  {name:"Ludovico Einaudi",country:"Italy",iso:"ITA",born:1955,active:[1996,2025],era:"Contemporary",genre:"Neo-Classical · Piano",lat:45.5,lon:9.2,bio:"The most commercially successful classical pianist of the 21st century and the most divisive. He studied with Luciano Berio, which gives him impeccable avant-garde credentials he largely ignores. Serious classical musicians are frequently snooty about him; audiences are not. In 2016 he performed a piece called Elegy for the Arctic on a floating platform in the Norwegian Arctic Ocean as Greenpeace filmed the melting ice behind him. Ten million people watched it.",search:"Ludovico Einaudi Nuvole Bianche"},
  {name:"Ólafur Arnalds",country:"Iceland",iso:"ISL",born:1986,active:[2007,2025],era:"Contemporary",genre:"Neo-Classical · Electronic",lat:64.1,lon:-21.9,bio:"The Reykjavik composer who started out as the drummer in a death metal band and ended up one of the most streamed contemporary classical artists on the planet. He uses generative computer systems in his live performances that respond to what he plays in real time, meaning the music is never exactly the same twice. His score for the TV series Broadchurch was what many people heard first. He considers Reykjavik's specific quality of light to be a direct influence on his sound.",search:"Olafur Arnalds Near Light"},
  {name:"Anna Thorvaldsdottir",country:"Iceland",iso:"ISL",born:1977,active:[2007,2025],era:"Contemporary",genre:"Orchestral · Chamber",lat:64.2,lon:-21.7,bio:"One of the most celebrated composers of her generation whose orchestral work sounds like Iceland's geology made audible -- thick slow-moving textures that shift like lava or permafrost. Metacosmos was premiered at Carnegie Hall by the New York Philharmonic. She is entirely self-taught in composition. The New York Times called her one of the most important composers working today.",search:"Anna Thorvaldsdottir Aeriality"},
  {name:"Thomas Adès",country:"England",iso:"GBR",born:1971,active:[1993,2025],era:"Contemporary",genre:"Opera · Orchestral · Piano",lat:51.5,lon:-0.1,bio:"The most celebrated British composer of his generation and one of the most formidably demanding pianists alive. He gave the world premiere of his own Piano Concerto as both soloist and conductor simultaneously. The Exterminating Angel, based on the Buñuel film, premiered at Salzburg in 2016 to enormous critical acclaim. He is famously exacting in rehearsal and has reportedly reduced orchestral musicians to stunned silence with a single glance.",search:"Thomas Ades The Exterminating Angel"},
];

const secondary=[
  {name:"Girolamo Frescobaldi",country:"Italy",iso:"ITA",born:1583,active:[1608,1643],era:"Early Baroque",genre:"Keyboard · Organ",lat:44.8,lon:11.6,bio:"The greatest Italian keyboardist of his era who drew crowds of 30,000 to St Peter's Basilica to hear him play the organ -- almost certainly an exaggeration, but the legend gives a sense of his celebrity. The young Bach copied out his Fiori Musicali by hand. Organist at St Peter's for most of his career, he was one of those rare musicians whose playing seemed to affect audiences physically."},
  {name:"Michael Praetorius",country:"Germany",iso:"DEU",born:1571,active:[1605,1621],era:"Early Baroque",genre:"Sacred · Vocal",lat:52.2,lon:10.5,bio:"The most prolific German composer of the early 17th century and author of the Syntagma Musicum -- the most invaluable encyclopaedia of musical instruments and practice of the era. He worked for the Duke of Brunswick and died on his 50th birthday. He apparently never bothered with an elaborate gravestone. The description of Renaissance and early Baroque instruments in his treatise is so precise that modern instrument builders still use it."},
  {name:"Samuel Scheidt",country:"Germany",iso:"DEU",born:1587,active:[1609,1654],era:"Early Baroque",genre:"Keyboard · Sacred",lat:51.5,lon:11.9,bio:"One of the three great early German Baroque masters alongside Schütz and Schein. He spent most of his career as organist in Halle, was sacked during the Thirty Years War when the city ran out of money to pay him, rehired when funds improved, and produced keyboard music of remarkable sophistication throughout. His Tabulatura Nova was the most important German keyboard publication of the early 17th century."},
  {name:"Juan Bautista Cabanilles",country:"Spain",iso:"ESP",born:1644,active:[1665,1712],era:"Baroque",genre:"Keyboard · Organ",lat:39.5,lon:-0.4,bio:"The greatest Spanish organist of the Baroque era who spent his entire career at Valencia Cathedral without apparently considering going anywhere else. Over 200 keyboard works survive. He was ordained as a priest and remained at the cathedral until his death, the model of devoted institution. The Spanish equivalent of Buxtehude: enormously influential locally, almost unknown elsewhere."},
  {name:"Dieterich Buxtehude",country:"Germany",iso:"DEU",born:1637,active:[1668,1707],era:"Baroque",genre:"Organ · Sacred",lat:53.9,lon:10.7,bio:"The most celebrated North German organist before Bach. The young Bach walked 250 miles from Arnstadt to Lübeck to hear him play -- and then stayed four months when he had been given four weeks' leave. There was apparently also the matter of Buxtehude's unmarried daughter: following the custom of the time, any successor to the post would be expected to marry her. Bach declined and walked 250 miles home."},
  {name:"Johann Pachelbel",country:"Germany",iso:"DEU",born:1653,active:[1677,1706],era:"Baroque",genre:"Keyboard · Sacred",lat:49.5,lon:11.1,bio:"His Canon in D is the most instantly recognised piece of Baroque music after Vivaldi's Four Seasons and is played at roughly two thirds of all Western weddings. Professional string players have a complicated emotional relationship with it. He was Johann Christoph Bach's teacher -- and Johann Christoph then taught Johann Sebastian. Pachelbel is therefore directly in the lineage of the greatest composer in history and is remembered mostly for one Canon he probably considered a minor exercise."},
  {name:"Marc-Antoine Charpentier",country:"France",iso:"FRA",born:1643,active:[1670,1704],era:"Baroque",genre:"Sacred · Opera",lat:48.9,lon:2.3,bio:"His Prelude to a Te Deum opens every single Eurovision Song Contest broadcast, meaning more people have heard it than almost any other piece of classical music, and almost none of them know his name. In his own lifetime he was systematically blocked from the senior positions he deserved by Lully's monopoly over all French musical life. He is one of history's clearest examples of a great talent suppressed by a more powerful rival."},
  {name:"Marin Marais",country:"France",iso:"FRA",born:1656,active:[1686,1725],era:"Baroque",genre:"Viol · Chamber",lat:48.9,lon:2.3,bio:"The greatest French viol player and the subject of Tous les Matins du Monde, a film based on his relationship with his teacher Sainte-Colombe, whom he reportedly abandoned for advancement at Versailles and spent the rest of his life haunted by. He left Sainte-Colombe's teaching without permission and was not forgiven. The film presents this as a lifetime's guilt, which may be theatrical but rings musically true."},
  {name:"Alessandro Scarlatti",country:"Italy",iso:"ITA",born:1660,active:[1679,1725],era:"Baroque",genre:"Opera · Sacred",lat:40.8,lon:14.2,bio:"Father of Domenico and founder of the Neapolitan school of opera. He established the da capo aria form that structured Italian opera for 70 years. He wrote 114 operas, a figure that becomes less impressive when you realise his output was partly driven by the need to keep powerful patrons entertained. His son Domenico became more famous, which fathers in that era tended not to take well."},
  {name:"Georg Ph. Telemann",country:"Germany",iso:"DEU",born:1681,active:[1704,1767],era:"Baroque",genre:"Opera · Orchestral",lat:53.6,lon:10.0,bio:"The most prolific major composer in history -- over 3,000 works, including 1,043 cantatas. He was more celebrated than Bach in his lifetime and was offered the Leipzig job before Bach was: he turned it down to stay in Hamburg where he was better paid. His autobiography is vivid and self-promotional. He taught himself music largely from borrowed scores and described the process with considerable satisfaction."},
  {name:"Jean-Philippe Rameau",country:"France",iso:"FRA",born:1683,active:[1722,1764],era:"Baroque",genre:"Opera · Keyboard",lat:48.9,lon:2.3,bio:"The greatest French composer of the 18th century and also the author of the first systematic theory of Western harmony -- the foundation on which music theory teaching still rests today. He was also a difficult person who got into public theoretical arguments with, among others, Jean-Jacques Rousseau, which Rousseau lost but wrote about entertainingly for years afterwards."},
  {name:"Giovanni B. Pergolesi",country:"Italy",iso:"ITA",born:1710,active:[1730,1736],era:"Baroque",genre:"Opera · Sacred",lat:41.9,lon:12.5,bio:"He died at 26 of tuberculosis and still changed Western music. La serva padrona, written at 22, launched comic opera as a genre. His Stabat Mater, written in the last months of his life, became the most reprinted piece of music of the entire 18th century. There is some suspicion that a number of works attributed to him posthumously are forgeries capitalising on his fame, which was greater after his death than during it."},
  {name:"Muzio Clementi",country:"Italy",iso:"ITA",born:1752,active:[1770,1832],era:"Classical",genre:"Piano · Sonata",lat:41.9,lon:12.5,bio:"Mozart's great rival as a keyboard player who outlived him by 40 years and had the last laugh on every front. They had a famous competitive duel before the Emperor in 1781. Mozart called him a mere mechanicus and a charlatan. Clementi went on to found a piano manufacturing company, a music publishing business, and to write the piano method still used in conservatories today. He was quite rich by the end."},
  {name:"Antonio Salieri",country:"Italy",iso:"AUT",born:1750,active:[1770,1824],era:"Classical",genre:"Opera",lat:45.5,lon:11.5,bio:"Mozart's real rival and one of the most powerful musical figures in Vienna -- not a poisoner but a ruthless political operator who controlled access to the Emperor. He taught Beethoven, Schubert, and Liszt, which makes him the most influential teacher in Viennese musical history. The murder story emerged after his death and he had denied it on his deathbed. The damage to his reputation, courtesy of a 19th century Russian play and then Peter Shaffer, was permanent."},
  {name:"Michael Haydn",country:"Austria",iso:"AUT",born:1737,active:[1762,1806],era:"Classical",genre:"Sacred · Symphony",lat:47.8,lon:13.0,bio:"Joseph's younger brother and a major figure in Salzburg who is one of music history's greatest victims of proximity. He was an excellent composer who worked alongside Mozart for years. Mozart borrowed from him freely. He is barely discussed except as the less famous Haydn."},
  {name:"Jan Dussek",country:"Czech Republic",iso:"CZE",born:1760,active:[1779,1812],era:"Classical",genre:"Piano · Sonata",lat:50.4,lon:15.0,bio:"A Bohemian pianist who was arguably writing proto-Romantic music before Romanticism existed. He fled creditors across Europe repeatedly. He wrote piano sonatas with harmonic adventurousness that anticipates Schubert and Beethoven's late style by decades. He was also reportedly very handsome and positioned his piano so the audience could see his profile -- possibly the first pianist to do so. Liszt later did the same."},
  {name:"Hector Berlioz",country:"France",iso:"FRA",born:1803,active:[1826,1869],era:"Romantic",genre:"Symphonic · Orchestral",lat:48.9,lon:2.3,bio:"The wild Romantic who invented the modern orchestra and one of music's most spectacular obsessives. He became insanely in love with an Irish actress named Harriet Smithson after seeing her play Ophelia -- without speaking a word to her. She rejected him repeatedly. He wrote the Symphonie Fantastique about his obsession, including a March to the Scaffold and a Witches' Sabbath. Then they actually met. They married. It was a complete disaster."},
  {name:"Felix Mendelssohn",country:"Germany",iso:"DEU",born:1809,active:[1820,1847],era:"Romantic",genre:"Symphony · Oratorio",lat:52.5,lon:13.4,bio:"The child prodigy who wrote the Midsummer Night's Dream overture at 17, revived Bach's St Matthew Passion after decades of neglect, and worked himself to death at 38. His sister Fanny was possibly as musically gifted and was forbidden to compose professionally by their father. She died at 41. Felix received the news during a rehearsal, collapsed, and was dead within six months. They were extremely close."},
  {name:"Mikhail Glinka",country:"Russia",iso:"RUS",born:1804,active:[1836,1857],era:"Romantic",genre:"Opera · Orchestral",lat:55.8,lon:37.6,bio:"The father of Russian classical music whose personal life was a comprehensive humiliation. His wife left him for another man while he was composing what became known as the founding work of Russian opera. He never recovered emotionally. Every subsequent Russian composer from Tchaikovsky to Stravinsky acknowledged that without Glinka there would have been no Russian musical tradition to build on."},
  {name:"Gaetano Donizetti",country:"Italy",iso:"ITA",born:1797,active:[1818,1845],era:"Romantic",genre:"Opera",lat:45.7,lon:9.7,bio:"One of the great bel canto composers who lost his wife and all three children and then went mad from syphilis in his early fifties. The mad scene in Lucia di Lammermoor is the most demanding showpiece in the soprano repertoire. He wrote over 70 operas. His own madness, confined to an institution in his final years while still occasionally lucid enough to understand his situation, has a terrible resonance with his work."},
  {name:"Vincenzo Bellini",country:"Italy",iso:"ITA",born:1801,active:[1825,1835],era:"Romantic",genre:"Opera",lat:37.5,lon:15.1,bio:"The master of the long singing line who died at 33 in a Paris suburb in disputed circumstances. He had a long stormy affair with a married woman that eventually drove him to Paris partly to escape her. His melodies influenced Chopin directly -- Chopin kept a portrait of Bellini above his piano -- and also influenced Wagner, who studied the Bellini operas carefully and then pretended he hadn't."},
  {name:"Gioachino Rossini",country:"Italy",iso:"ITA",born:1792,active:[1810,1829],era:"Romantic",genre:"Opera",lat:43.8,lon:12.9,bio:"The most brilliant operatic talent of his era who stopped composing entirely at 37 and spent the remaining 39 years of his life cooking, eating, and giving legendary dinner parties in Paris. He wrote nothing of consequence for nearly four decades and was serene about it. He claimed to have wept only three times: when his first opera failed, when he heard Paganini play, and when a truffled turkey fell overboard during a boat trip on the lake."},
  {name:"Mykola Lysenko",country:"Ukraine",iso:"UKR",born:1842,active:[1868,1912],era:"Romantic",genre:"Opera · Piano · Song",lat:50.5,lon:30.5,bio:"The father of Ukrainian classical music who spent his career building a national musical identity under Russian imperial suppression that tried systematically to erase Ukrainian language and culture. His opera Taras Bulba was banned. He was monitored by tsarist police. He founded the first music school in Kyiv using his own money. His entire life was an act of cultural resistance."},
  {name:"Aleksandr Borodin",country:"Russia",iso:"RUS",born:1833,active:[1862,1887],era:"Romantic",genre:"Opera · Orchestral",lat:55.8,lon:37.6,bio:"A member of The Five who was also a professional chemist publishing serious academic papers and composing only in his spare time on evenings and weekends. He left his opera Prince Igor unfinished. Rimsky-Korsakov reconstructed the missing portions from memory after Borodin's death at a party -- a heart attack, at 53, mid-conversation."},
  {name:"Charles-Valentin Alkan",country:"France",iso:"FRA",born:1813,active:[1838,1888],era:"Romantic",genre:"Piano",lat:48.9,lon:2.3,bio:"The most extraordinary pianist of his era after Liszt, who became a recluse, stopped performing, and was almost entirely forgotten until his rediscovery in the 20th century. His piano works are of almost insane technical difficulty. He may have died when a bookcase fell on him. The bookcase reportedly contained the Talmud. This story may be apocryphal but is too good not to mention."},
  {name:"Gabriel Fauré",country:"France",iso:"FRA",born:1845,active:[1865,1924],era:"Romantic",genre:"Chamber · Song · Choral",lat:48.9,lon:2.3,bio:"One of the most refined French composers who spent the last 20 years of his life profoundly deaf. His Requiem is a vision of serene acceptance rather than terror. He had a long affair with Emma Bardac who then left him for Debussy, which was a complicated blow to absorb. He became director of the Paris Conservatoire deaf and ran it with great distinction."},
  {name:"Hugo Wolf",country:"Austria",iso:"AUT",born:1860,active:[1877,1897],era:"Romantic",genre:"Lied · Song Cycle",lat:48.2,lon:16.4,bio:"The greatest composer of German Lieder after Schubert who died insane at 42. As a critic he was savagely and personally cruel about Brahms -- far beyond what the professional context required. He fell in love with a married woman who eventually left her husband for him. In 1897 he suffered a complete mental collapse, began claiming he had been appointed director of the Vienna Opera, and spent his remaining years in an asylum."},
  {name:"Franz Lehár",country:"Hungary",iso:"HUN",born:1870,active:[1895,1948],era:"Late Romantic",genre:"Operetta",lat:47.5,lon:19.0,bio:"The king of Viennese operetta who counted Hitler among his personal friends, a relationship he exploited to protect his Jewish wife Sophie and his Jewish librettist Fritz Lohner-Beda. He secured Sophie's safety. He failed to secure Lohner-Beda's. Lohner-Beda -- who had written the words to Lehár's greatest hits -- was murdered in Auschwitz in 1942. Lehár's guilt about this failure was apparently profound."},
  {name:"Pietro Mascagni",country:"Italy",iso:"ITA",born:1863,active:[1889,1945],era:"Romantic",genre:"Opera · Verismo",lat:43.5,lon:10.3,bio:"The composer of Cavalleria Rusticana -- entered for a competition, written in a burst of inspiration, and immediately the most successful Italian opera since Verdi. He spent the rest of his career trying and failing to repeat it. He became an enthusiastic Fascist supporter, which blackened his reputation after the war. He died in a Rome hotel room in 1945 while Italy was collapsing around him."},
  {name:"Alexander Scriabin",country:"Russia",iso:"RUS",born:1872,active:[1892,1915],era:"Late Romantic",genre:"Piano · Orchestral",lat:55.8,lon:37.6,bio:"One of the most radical figures in early 20th century music who genuinely believed his final major work would trigger the apocalypse. He was a devoted theosophist and mystic. He planned a piece called Mysterium to be performed in the foothills of the Himalayas over seven days, at the end of which the world would dissolve into a higher spiritual state. He died of blood poisoning from a lip abscess at 43 before writing a note of it."},
  {name:"Alexander Glazunov",country:"Russia",iso:"RUS",born:1865,active:[1882,1936],era:"Late Romantic",genre:"Symphony · Ballet",lat:59.9,lon:30.3,bio:"The last major Russian nationalist and a serious alcoholic who reportedly conducted some premieres while noticeably drunk. He reconstructed the missing first act of Borodin's Prince Igor entirely from memory after hearing Borodin play it once. He was also the examiner who failed the young Prokofiev at his conservatory entrance exam, which both of them later found awkward to discuss."},
  {name:"Enrique Granados",country:"Spain",iso:"ESP",born:1867,active:[1890,1916],era:"Late Romantic",genre:"Piano · Opera",lat:41.4,lon:2.2,bio:"A Spanish pianist and composer killed in one of the war's stranger accidents. His opera Goyescas had its world premiere in New York in 1916. He delayed his return home to try to obtain an audience with President Wilson. On the way back his ship was torpedoed by a German submarine in the English Channel. He had survived the initial sinking but reportedly drowned trying to rescue his wife from a lifeboat."},
  {name:"Federico Mompou",country:"Spain",iso:"ESP",born:1893,active:[1920,1987],era:"Modern",genre:"Piano · Song",lat:41.4,lon:2.2,bio:"The most intimate of the Spanish composers -- a miniaturist who produced some of the most quietly remarkable piano music of the 20th century. He was pathologically shy, rarely gave concerts, and avoided the musical mainstream completely. He lived in Paris for decades, returned to Barcelona, married at 70, and composed small perfect pieces until the end. His Música Callada is unlike anything else ever written."},
  {name:"George Gershwin",country:"USA",iso:"USA",born:1898,active:[1920,1937],era:"Modern",genre:"Jazz-Classical",lat:40.7,lon:-74.0,bio:"The composer who fused jazz and classical music and died of a brain tumour at 38. He moved in the highest society on both sides of the Atlantic and was notorious for playing the piano at his own parties, uninvited, for hours, whether anyone wanted him to or not. Several accounts suggest this was endearing the first few times and progressively less so. Rhapsody in Blue, premiered in 1924, changed permanently what concert music could be."},

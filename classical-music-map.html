  {name:"Paul Hindemith",country:"Germany",iso:"DEU",born:1895,active:[1919,1963],era:"Modern",genre:"Orchestra · Chamber",lat:50.1,lon:8.7,bio:"One of the leading German composers of the 1920s whose music was branded degenerate by the Nazis. He had a complicated relationship with his country -- he didn't want to leave but eventually had to. His opera Mathis der Maler, about an artist's moral responsibility in politically brutal times, was so clearly autobiographical that the Nazis suppressed it before he could finish it. He emigrated to America where he was treated as a distinguished exile and eventually became an American citizen."},
  {name:"Sergei Prokofiev",country:"Russia",iso:"RUS",born:1891,active:[1910,1953],era:"Modern",genre:"Symphony · Ballet · Opera",lat:55.8,lon:37.6,bio:"One of the great melodists of the 20th century who made the catastrophic decision to return to Stalin's Soviet Union in 1936, apparently believing he could work there and remain artistically free. He was wrong. He was persecuted, forced to write self-criticisms, and watched his music condemned. He died on the same day as Stalin -- March 5th 1953. There were no flowers left in Moscow for his funeral. They had all gone to Stalin's."},
  {name:"Francis Poulenc",country:"France",iso:"FRA",born:1899,active:[1917,1963],era:"Modern",genre:"Chamber · Opera · Vocal",lat:48.9,lon:2.3,bio:"The wit and the mystic of 20th century French music -- uniquely capable of both irreverent charm and profound religious gravity in the same afternoon. He was openly gay in an era when this was unusual to discuss publicly, and he discussed it with characteristic frankness in a biography published during his lifetime that caused considerable discussion. His Dialogues of the Carmelites, depicting nuns going to the guillotine during the Terror, is one of the great 20th century operas."},
  {name:"Arthur Honegger",country:"Switzerland",iso:"CHE",born:1892,active:[1915,1955],era:"Modern",genre:"Symphony · Dramatic",lat:47.4,lon:8.5,bio:"The most serious member of Les Six who was deeply pessimistic about where modern music was heading and said so repeatedly, which his colleagues found tiresome. Pacific 231 -- a portrait of a steam locomotive in music -- caused a sensation in 1923. His five symphonies are among the most underrated of the 20th century. He spent the Second World War in occupied Paris and was psychologically damaged by the experience."},
  {name:"Darius Milhaud",country:"France",iso:"FRA",born:1892,active:[1912,1974],era:"Modern",genre:"Opera · Orchestral",lat:48.9,lon:2.3,bio:"The most prolific member of Les Six with over 400 works and a composer who brought Brazilian rhythms into French music after two years in Rio de Janeiro. La Création du Monde was written the year before Gershwin's Rhapsody in Blue and predates it in fusing jazz and classical language -- a priority dispute that was never fully resolved. He spent the war years at Mills College in California."},
  {name:"George Enescu",country:"Romania",iso:"ROU",born:1881,active:[1897,1950],era:"Modern",genre:"Opera · Chamber · Orchestral",lat:44.4,lon:26.1,bio:"Romania's greatest composer and also one of the finest violinists and conductors of the 20th century -- three major careers in one. He taught Yehudi Menuhin who described him as the greatest musician he ever encountered. His opera Oedipe took 25 years to complete and is one of the great overlooked masterpieces of the 20th century."},
  {name:"Carl Orff",country:"Germany",iso:"DEU",born:1895,active:[1935,1982],era:"Modern",genre:"Dramatic Music",lat:48.1,lon:11.6,bio:"Carmina Burana is the most performed choral work of the 20th century. O Fortuna is in more television adverts than any other piece of classical music. He stayed in Germany under the Nazis and justified it by saying he was educating children through his Schulwerk teaching method. After the war he claimed to have been part of the anti-Nazi resistance, a claim the denazification committee investigated and found difficult to substantiate."},
  {name:"Luigi Nono",country:"Italy",iso:"ITA",born:1924,active:[1950,1990],era:"Modern",genre:"Avant-Garde · Electronic",lat:45.4,lon:12.3,bio:"The most politically committed composer of the post-war avant-garde -- a card-carrying communist who put radical politics at the centre of his music and his life. He married Schoenberg's daughter. His music was performed at protests and in factories. Prometeo was given its premiere in a specially constructed wooden ark inside a Venetian church designed by Renzo Piano."},
  {name:"Luciano Berio",country:"Italy",iso:"ITA",born:1925,active:[1950,2003],era:"Modern",genre:"Orchestral · Electronic",lat:44.1,lon:9.8,bio:"The most celebrated Italian composer of the post-war avant-garde. He was married to the mezzo-soprano Cathy Berberian, for whom he wrote some of the most extreme and demanding vocal works in the repertoire. Their divorce was, by all accounts, as operatic as the music. His Sinfonia is one of the definitive works of the 20th century, weaving Mahler, Beckett, and scraps of a hundred other pieces into a single movement."},
  {name:"Pierre Boulez",country:"France",iso:"FRA",born:1925,active:[1950,2016],era:"Modern",genre:"Orchestral · Conductor",lat:48.9,lon:2.3,bio:"The most influential and intellectually domineering figure in post-war European classical music. He declared in a famous essay that any composer who had not felt the necessity of the 12-tone technique was useless and that opera houses should be blown up. He softened these positions considerably over the following 50 years and became one of the greatest conductors of his generation. His charm in person was reportedly at complete odds with his published severity."},
  {name:"Karlheinz Stockhausen",country:"Germany",iso:"DEU",born:1928,active:[1952,2007],era:"Modern",genre:"Electronic · Avant-Garde",lat:50.9,lon:6.9,bio:"The most radical composer of the 20th century who John Lennon put on the Sgt. Pepper cover. In a 2001 interview he described the September 11 attacks as the greatest work of art in the history of the cosmos, which ended his career in Germany. He had previously claimed in an interview that he came from a star in the Sirius system. His final project was a 29-hour opera cycle called Licht -- one opera for each day of the week."},
  {name:"Harrison Birtwistle",country:"England",iso:"GBR",born:1934,active:[1958,2022],era:"Modern",genre:"Opera · Orchestral",lat:51.5,lon:-0.1,bio:"The most uncompromising figure in late 20th century British music, whose orchestral work Panic for saxophone and orchestra caused a national scandal when performed at the Last Night of the Proms in 1995. He was reportedly completely indifferent to the reaction. He was knighted and continued writing difficult, powerful, dissonant music until his death in 2022 at 87."},
  {name:"Henri Dutilleux",country:"France",iso:"FRA",born:1916,active:[1947,2013],era:"Modern",genre:"Symphony · Chamber",lat:48.9,lon:2.3,bio:"The great independent of 20th century French music who rejected both serialism and minimalism with equal contempt and went his own way. He was so self-critical that he suppressed several early works and revised others for decades after their premieres. His output is therefore small but immaculate. He worked until his late nineties and died in 2013 at 97."},
  {name:"Giya Kancheli",country:"Georgia",iso:"GEO",born:1935,active:[1962,2019],era:"Modern",genre:"Symphony · Chamber",lat:41.7,lon:44.8,bio:"The greatest Georgian composer, creator of seven symphonies that alternate between devastating climactic eruptions and silences so long and intense that audiences were sometimes uncertain whether the performance had ended. He spent years writing film scores for Georgian cinema before turning to the concert hall. He left Georgia after the Soviet collapse and spent the rest of his life in Antwerp, visited by homesickness so profound it became a compositional element."},
  {name:"Witold Lutoslawski",country:"Poland",iso:"POL",born:1913,active:[1938,1994],era:"Modern",genre:"Orchestral · Chamber",lat:52.2,lon:21.0,bio:"Poland's most internationally celebrated post-war composer who had a single decisive creative experience that changed everything. He heard Cage's Concert for Piano on the radio by accident in 1960 and was immediately galvanised -- not by wanting to do what Cage did, but by understanding that chance could be an element of composition while retaining the composer's control of the overall structure. His Third Symphony is one of the great works of the late 20th century."},
  {name:"Einojuhani Rautavaara",country:"Finland",iso:"FIN",born:1928,active:[1952,2016],era:"Modern",genre:"Symphony · Orchestral",lat:60.2,lon:24.9,bio:"Finland's great post-Sibelius voice. Cantus Arcticus weaves recordings of real Finnish birdsong into lush orchestral textures with extraordinary effect. His Angel of Light symphony became one of the most popular new orchestral works of the 1990s in circumstances that surprised him -- he had not expected late Romantic accessibility to be fashionable again. He died in 2016 at 87."},
  {name:"Steve Reich",country:"USA",iso:"USA",born:1936,active:[1965,2025],era:"Minimalist",genre:"Minimalist · Phase",lat:40.7,lon:-74.0,bio:"The inventor of phase music and a founding minimalist who studied drumming in Ghana and let it change everything. Music for 18 Musicians is the most influential work of the minimalist movement. Different Trains uses speech recordings from Holocaust survivors and American train porters, interleaved with string quartets. He won a Grammy for it. He is still composing."},
  {name:"Philip Glass",country:"USA",iso:"USA",born:1937,active:[1968,2025],era:"Minimalist",genre:"Opera · Film · Orchestra",lat:40.7,lon:-74.0,bio:"The most famous minimalist who drove a taxi in New York until his late thirties because his music made no money. He studied with Ravi Shankar. Einstein on the Beach -- a five-hour opera with no plot -- premiered at the Metropolitan Opera in 1976 and changed what music theatre could be. He is reportedly still writing continuously. His output is enormous and uneven and his defenders and critics are equally passionate."},
  {name:"John Adams",country:"USA",iso:"USA",born:1947,active:[1978,2025],era:"Minimalist",genre:"Opera · Orchestral",lat:37.8,lon:-122.4,bio:"The most performed living American classical composer who began Nixon in China as a joke he was almost too embarrassed to pursue. His colleagues thought the idea was absurd. It premiered in 1987 to enormous acclaim. Doctor Atomic -- about Oppenheimer and the Manhattan Project -- is arguably the most important American opera of the 21st century. He also wrote On the Transmigration of Souls for the New York Philharmonic as a memorial to 9/11."},
  {name:"Erkki-Sven Tuur",country:"Estonia",iso:"EST",born:1959,active:[1985,2025],era:"Minimalist",genre:"Symphony · Orchestral",lat:59.4,lon:24.7,bio:"Estonia's other major composer alongside Pärt -- turbulent and symphonic where Pärt is still and sacred. He was the guitarist and composer for a progressive rock band before turning to classical composition, and the energy has never entirely left his work. His eight symphonies are among the most interesting in contemporary music."},
  {name:"Veljo Tormis",country:"Estonia",iso:"EST",born:1930,active:[1960,2017],era:"Minimalist",genre:"Choral · Folk",lat:59.4,lon:24.7,bio:"Estonia's greatest choral composer who spent decades collecting ancient Estonian runic songs and transforming them into choral works of extraordinary power. The Soviet authorities banned his Curse Upon Iron -- a ritual incantation against war -- for being politically and spiritually subversive. He outlasted them. His archive of choral music is one of the great achievements of 20th century composition."},
  {name:"Johann Johannsson",country:"Iceland",iso:"ISL",born:1969,active:[2002,2018],era:"Contemporary",genre:"Film · Neo-Classical",lat:64.1,lon:-21.9,bio:"The Icelandic composer who scored Arrival and Sicario and died suddenly at 48 from an accidental combination of cocaine and flu medication. His score for Arrival -- which uses tape recordings of his father operating a computer from the 1960s alongside strings and electronics -- is one of the great achievements of 21st century film music. The shock of his death at the height of his powers was felt widely."},
  {name:"Caroline Shaw",country:"England",iso:"GBR",born:1982,active:[2012,2025],era:"Contemporary",genre:"Chamber · Choral · Crossover",lat:51.5,lon:-0.1,bio:"The youngest winner of the Pulitzer Prize for Music at 30. She has collaborated with Kanye West, Rosalía, and Renée Fleming with equal fluency, moving between avant-garde, early music, pop production, and choral writing without apparent effort or anxiety. She is also a violinist and singer. The classical music world is faintly unsure what to make of her, which is probably the right response."},
  {name:"Magnus Lindberg",country:"Finland",iso:"FIN",born:1958,active:[1990,2025],era:"Contemporary",genre:"Orchestral · Concerto",lat:60.2,lon:24.9,bio:"One of the most technically accomplished orchestral composers alive who was also composer-in-residence with both the New York Philharmonic and the London Philharmonia. His Piano Concerto No.2 is a feat of structural invention over 40 minutes. He was part of an extraordinary generation of Finnish composers -- alongside Salonen and Saariaho -- who emerged from the Helsinki Sibelius Academy in the 1980s."},
  {name:"Georg Friedrich Haas",country:"Austria",iso:"AUT",born:1953,active:[1980,2025],era:"Contemporary",genre:"Microtonal · Chamber",lat:48.2,lon:16.4,bio:"The leading figure in contemporary microtonal music whose personal life became unexpectedly famous when he and his partner gave a long interview to New York Magazine in 2015 describing their 24/7 BDSM relationship in considerable detail. The article caused substantial discussion in classical music circles. His microtonal works -- including in vain, performed in near-total darkness -- are among the most important of 21st century music."},
  {name:"Tristan Murail",country:"France",iso:"FRA",born:1947,active:[1975,2025],era:"Contemporary",genre:"Spectral · Orchestral",lat:48.9,lon:2.3,bio:"One of the founders of spectral music -- a compositional method based on the acoustic physics of sound itself rather than inherited harmonic language. Gondwana and Désintégrations are the defining works of the movement. He taught at Columbia University for years. Spectral techniques have now been absorbed into the mainstream of contemporary composition."},
  {name:"Mark-Anthony Turnage",country:"England",iso:"GBR",born:1960,active:[1988,2025],era:"Contemporary",genre:"Opera · Orchestral",lat:51.5,lon:-0.1,bio:"The leading British composer working between jazz and classical who first announced himself with the opera Greek, based on the Steven Berkoff play -- furious, vulgar, technically brilliant. His opera Anna Nicole, about Anna Nicole Smith, was a Covent Garden sensation in 2011. He collaborates regularly with jazz musicians including John Scofield and Martin Robertson."},
  {name:"Unsuk Chin",country:"South Korea",iso:"KOR",born:1961,active:[1988,2025],era:"Contemporary",genre:"Opera · Orchestral",lat:37.6,lon:127.0,bio:"The most celebrated Korean classical composer, a student of Ligeti in Hamburg who has developed a glittering and intricate orchestral language of her own. Her opera Alice in Wonderland premiered at the Bavarian State Opera in 2007. She has been called Ligeti's most significant heir, which is not a description she discourages."},
  {name:"Esa-Pekka Salonen",country:"Finland",iso:"FIN",born:1958,active:[1982,2025],era:"Contemporary",genre:"Orchestral · Concerto",lat:60.2,lon:24.9,bio:"Better known as one of the great conductors of his generation who transformed the Los Angeles Philharmonic into a world-class institution, Salonen is also a significant composer. His Violin Concerto and LA Variations are genuinely impressive. He studied with Ligeti alongside Lindberg and Saariaho. He resigned as Music Director in LA, moved to San Francisco, and continued conducting and composing simultaneously."},
  {name:"Franz Berwald",country:"Sweden",iso:"SWE",born:1796,active:[1817,1868],era:"Romantic",genre:"Symphony · Chamber",lat:59.3,lon:18.1,bio:"Sweden's greatest composer and one of the most comprehensively ignored major talents in musical history. He ran an orthopaedic clinic in Berlin to support himself because his music made almost no impression. He was not elected to the Swedish Royal Academy of Music until the age of 67. His Sinfonie Singulière is structurally original in ways that anticipate late Romantic developments by 30 years."},
  {name:"Wilhelm Stenhammar",country:"Sweden",iso:"SWE",born:1871,active:[1895,1927],era:"Late Romantic",genre:"Symphony · Chamber",lat:59.3,lon:18.1,bio:"Sweden's finest composer of the early 20th century and a major conductor who destroyed several of his own early works as insufficiently good. His Second Symphony is generally considered the greatest Swedish symphony. He was consumed by self-doubt despite enormous gifts and rarely felt his work was finished."},
  {name:"Johan Svendsen",country:"Norway",iso:"NOR",born:1840,active:[1865,1911],era:"Romantic",genre:"Symphony · Orchestral",lat:59.9,lon:10.7,bio:"Grieg's greatest Norwegian contemporary and in some ways his equal. His marriage collapsed scandalously when his wife reportedly burned the manuscript of his Third Symphony in a rage. He never wrote another symphony. He moved to Copenhagen and spent the rest of his career as a conductor, producing almost nothing original. The burning of a manuscript as an act of domestic destruction is one of music history's most damaging moments."},
  {name:"Carlos Seixas",country:"Portugal",iso:"PRT",born:1704,active:[1720,1742],era:"Baroque",genre:"Keyboard",lat:38.7,lon:-9.1,bio:"The Portuguese Scarlatti. A keyboard virtuoso who worked alongside Domenico Scarlatti in Lisbon and produced over 700 toccatas and sonatas of sparkling invention. Almost entirely unknown outside Portugal and even there undervalued. He died at 38."},
  {name:"Nikos Skalkottas",country:"Greece",iso:"GRC",born:1904,active:[1927,1949],era:"Modern",genre:"Chamber · Piano · Orchestral",lat:37.9,lon:23.7,bio:"One of the most extraordinary and unknown composers of the 20th century. A student of Schoenberg in Berlin, he returned to Athens, supported himself as a back-desk violinist, and wrote hundreds of major works in complete secrecy -- none performed in his lifetime, none known about. He died at 45. The scale of what was found in his lodgings was staggering: over 110 works, including symphonies, concertos, and string quartets, none of which the world had heard."},
  {name:"Heitor Villa-Lobos",country:"Brazil",iso:"BRA",born:1887,active:[1915,1959],era:"Modern",genre:"Guitar · Orchestra",lat:-22.9,lon:-43.2,bio:"South America's greatest classical composer who claimed during his early career to have been captured by cannibals in the interior of Brazil. His biographers have never been able to verify this story. He may have invented it to make himself seem more interesting. He was in any case remarkable enough: a self-taught composer who created a completely original synthesis of Brazilian folk music and European modernism. His guitar Etudes are the foundation of the 20th century guitar repertoire."},
];

const isMobile=window.innerWidth<=600;
const majorR=isMobile?8:5.5;
const minorR=isMobile?5:3;
const isoToNum={ITA:380,DEU:276,AUT:40,FRA:250,RUS:643,POL:616,CZE:203,NOR:578,FIN:246,HUN:348,ESP:724,GBR:826,NLD:528,BEL:56,ROU:642,DNK:208,PRT:620,GRC:300,UKR:804,SWE:752,EST:233,ISL:352,CHE:756,USA:840,BRA:76,GEO:268,KOR:410};
const europeanNums=new Set([8,20,31,40,51,56,70,100,112,191,203,208,233,246,250,276,300,348,352,372,380,428,440,442,528,578,616,620,642,643,688,703,705,724,752,756,792,804,826,891,268,756,840,76,410]);

let currentYear=START_YEAR,isDragging=false;
const eraMarkersEl=document.getElementById('era-markers');
ERAS.forEach(e=>{const el=document.createElement('div');el.className='era-marker';el.textContent=e.name;eraMarkersEl.appendChild(el);});
const trackErasEl=document.getElementById('track-eras');
ERAS.forEach(e=>{const s=document.createElement('div');s.className='era-seg';s.style.width=((e.end-e.start+1)/SPAN*100)+'%';s.style.background=e.color;trackErasEl.appendChild(s);});
const handle=document.getElementById('scrubber-handle'),fill=document.getElementById('track-fill'),tooltip=document.getElementById('year-tooltip'),track=document.getElementById('scrubber-track');
function yearToFrac(y){return(y-START_YEAR)/SPAN;}
function fracToYear(f){return Math.round(START_YEAR+f*SPAN);}
function setHandle(frac){const p=Math.max(0,Math.min(100,frac*100));handle.style.left=p+'%';fill.style.width=p+'%';tooltip.textContent=fracToYear(frac);}
function onScrub(cx){const r=track.getBoundingClientRect();const f=Math.max(0,Math.min(1,(cx-r.left)/r.width));const y=fracToYear(f);if(y!==currentYear){currentYear=y;setHandle(f);updateMap(y);}}
handle.addEventListener('mousedown',e=>{isDragging=true;handle.classList.add('dragging');e.preventDefault();});
track.addEventListener('mousedown',e=>{isDragging=true;handle.classList.add('dragging');onScrub(e.clientX);});
window.addEventListener('mousemove',e=>{if(isDragging)onScrub(e.clientX);});
window.addEventListener('mouseup',()=>{isDragging=false;handle.classList.remove('dragging');});
handle.addEventListener('touchstart',e=>{isDragging=true;handle.classList.add('dragging');e.preventDefault();},{passive:false});
window.addEventListener('touchmove',e=>{if(isDragging)onScrub(e.touches[0].clientX);},{passive:true});
window.addEventListener('touchend',()=>{isDragging=false;handle.classList.remove('dragging');});
setHandle(0);

const svg=d3.select('#map-svg');
let countryLayer=null,pinLayer=null,projection=null,pathGen=null,worldData=null;
function setupMap(){
  const wrap=document.getElementById('map-wrap');
  const W=wrap.clientWidth,H=wrap.clientHeight;
  svg.attr('width',W).attr('height',H);svg.selectAll('*').remove();
  const mobileScale = isMobile ? W*0.95 : W*1.05;
  const mobileTranslate = isMobile ? [W*0.48, H*0.52] : [W*0.38, H*0.5];
  projection=d3.geoConicConformal().center([15,50]).parallels([40,65]).scale(mobileScale).translate(mobileTranslate);
  pathGen=d3.geoPath().projection(projection);
  svg.append('rect').attr('width',W).attr('height',H).attr('fill','#2a3550');
  const g=d3.geoGraticule().step([10,10]);
  svg.append('path').datum(g()).attr('d',pathGen).attr('fill','none').attr('stroke','rgba(255,255,255,0.06)').attr('stroke-width',0.5);
  countryLayer=svg.append('g').attr('class','countries');
  pinLayer=svg.append('g').attr('class','pins');
}
function renderCountries(world){
  const features=topojson.feature(world,world.objects.countries).features;
  const borders=topojson.mesh(world,world.objects.countries,(a,b)=>a!==b);
  countryLayer.selectAll('path.country').data(features).join('path')
    .attr('class',d=>europeanNums.has(d.id)?'country':'country out-of-region')
    .attr('d',pathGen).attr('data-id',d=>d.id)
    .on('click',(event,d)=>{
      const visM=getMajorVisible(currentYear);
      const matchM=visM.find(c=>isoToNum[c.iso]===d.id);
      if(matchM){openModal(matchM);return;}
      const visS=getSecondaryVisible(currentYear);
      const matchS=visS.find(c=>isoToNum[c.iso]===d.id);
      if(matchS)openMinorModal(matchS);
    });
  countryLayer.append('path').datum(borders).attr('d',pathGen).attr('fill','none').attr('stroke','rgba(255,255,255,0.15)').attr('stroke-width',0.5);
}
function getMajorVisible(year){
  const seen=new Set();
  return major.filter(c=>{if(year<c.active[0]||year>c.active[1])return false;if(seen.has(c.iso))return false;seen.add(c.iso);return true;});
}
function getSecondaryVisible(year){
  const majorIsos=new Set(getMajorVisible(year).map(c=>c.iso));
  return secondary.filter(c=>{if(year<c.active[0]||year>c.active[1])return false;if(majorIsos.has(c.iso))return false;return true;});
}
function updateMap(year){
  const era=getEra(year);
  document.getElementById('era-badge').textContent=era.name;
  const visM=getMajorVisible(year),visS=getSecondaryVisible(year);
  const activeIds=new Set([...visM,...visS].map(c=>isoToNum[c.iso]).filter(Boolean));
  if(countryLayer){countryLayer.selectAll('path.country').classed('has-composer',d=>activeIds.has(d.id)).classed('active-composer',false);}
  if(pinLayer){
    pinLayer.selectAll('*').remove();
    visS.forEach(c=>{
      const coords=projection([c.lon,c.lat]);if(!coords)return;
      const[px,py]=coords;
      const g2=pinLayer.append('g').attr('class','pin-minor').attr('transform',`translate(${px},${py})`).on('click',()=>openMinorModal(c));
      g2.append('circle').attr('class','pin-dot-minor').attr('r',minorR);
      g2.append('text').attr('class','pin-label-minor').attr('x',7).attr('y',4).text(c.name);
    });
    visM.forEach(c=>{
      const coords=projection([c.lon,c.lat]);if(!coords)return;
      const[px,py]=coords;
      const g2=pinLayer.append('g').attr('class','pin-major').attr('transform',`translate(${px},${py})`).on('click',()=>openModal(c));
      g2.append('circle').attr('class','pin-pulse').attr('r',majorR);
      g2.append('circle').attr('class','pin-dot-major').attr('r',majorR);
      g2.append('text').attr('class','pin-label-major').attr('x',9).attr('y',4).text(c.name);
    });
  }
}
function spotifyURL(q){return'https://open.spotify.com/search/'+encodeURIComponent(q);}
function ytURL(q){return'https://www.youtube.com/results?search_query='+encodeURIComponent(q);}
function openModal(c){
  document.getElementById('m-year').textContent=c.born;
  document.getElementById('m-era').textContent=c.era;
  document.getElementById('m-name').textContent=c.name;
  document.getElementById('m-country').textContent=c.country;
  document.getElementById('m-genre').textContent=c.genre;
  document.getElementById('m-bio').textContent=c.bio;
  document.getElementById('spotify-btn').href=spotifyURL(c.search);
  document.getElementById('yt-btn').href=ytURL(c.search);
  document.getElementById('modal-backdrop').classList.add('open');
  if(countryLayer)countryLayer.selectAll('path.country').classed('active-composer',d=>d.id===isoToNum[c.iso]);
}
function closeModal(){
  document.getElementById('modal-backdrop').classList.remove('open');
  if(countryLayer)countryLayer.selectAll('path.country').classed('active-composer',false);
}
function openMinorModal(c){
  const q=c.name+' '+c.genre.split('·')[0].trim();
  document.getElementById('mm-year').textContent=c.born;
  document.getElementById('mm-era').textContent=c.era;
  document.getElementById('mm-name').textContent=c.name;
  document.getElementById('mm-country').textContent=c.country;
  document.getElementById('mm-genre').textContent=c.genre;
  document.getElementById('mm-bio').textContent=c.bio;
  document.getElementById('mm-spotify').href=spotifyURL(q);
  document.getElementById('mm-yt').href=ytURL(q);
  document.getElementById('minor-modal-backdrop').classList.add('open');
  if(countryLayer)countryLayer.selectAll('path.country').classed('active-composer',d=>d.id===isoToNum[c.iso]);
}
function closeMinorModal(){
  document.getElementById('minor-modal-backdrop').classList.remove('open');
  if(countryLayer)countryLayer.selectAll('path.country').classed('active-composer',false);
}
document.getElementById('modal-backdrop').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('minor-modal-backdrop').addEventListener('click',function(e){if(e.target===this)closeMinorModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeMinorModal();}});
setupMap();
fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r=>r.json())
  .then(world=>{worldData=world;document.getElementById('loading').style.display='none';renderCountries(world);updateMap(START_YEAR);})
  .catch(()=>{document.getElementById('loading').textContent='Map requires an internet connection to load.';});
window.addEventListener('resize',()=>{setupMap();if(worldData){renderCountries(worldData);updateMap(currentYear);}});
</script>

// ── ISO NUMERIC ────────────────────────────────────────────
const isoToNum = {
  ITA:380, DEU:276, AUT:40,  FRA:250, RUS:643, POL:616,
  CZE:203, NOR:578, FIN:246, HUN:348, ESP:724, GBR:826,
  NLD:528, BEL:56,  ROU:642, DNK:208, PRT:620, GRC:300,
  UKR:804, SWE:752, EST:233, ISL:352, CHE:756, USA:840,
  BRA:76,  GEO:268, KOR:410,
};

const europeanNums = new Set([
  8,20,31,40,51,56,70,100,112,191,203,208,233,246,250,276,
  300,348,352,372,380,428,440,442,528,578,616,620,642,643,
  688,703,705,724,752,756,792,804,826,891,268,40,756
]);

// ── SCRUBBER ───────────────────────────────────────────────
let currentYear=START_YEAR, isDragging=false;

const eraMarkersEl=document.getElementById('era-markers');
ERAS.forEach(e=>{ const el=document.createElement('div'); el.className='era-marker'; el.textContent=e.name; eraMarkersEl.appendChild(el); });

const trackErasEl=document.getElementById('track-eras');
ERAS.forEach(e=>{ const s=document.createElement('div'); s.className='era-seg'; s.style.width=((e.end-e.start+1)/SPAN*100)+'%'; s.style.background=e.color; trackErasEl.appendChild(s); });

const handle=document.getElementById('scrubber-handle');
const fill=document.getElementById('track-fill');
const tooltip=document.getElementById('year-tooltip');
const track=document.getElementById('scrubber-track');

function yearToFrac(y){return(y-START_YEAR)/SPAN;}
function fracToYear(f){return Math.round(START_YEAR+f*SPAN);}
function setHandle(frac){const p=Math.max(0,Math.min(100,frac*100));handle.style.left=p+'%';fill.style.width=p+'%';tooltip.textContent=fracToYear(frac);}

function onScrub(cx){const r=track.getBoundingClientRect();const f=Math.max(0,Math.min(1,(cx-r.left)/r.width));const y=fracToYear(f);if(y!==currentYear){currentYear=y;setHandle(f);updateMap(y);}}

handle.addEventListener('mousedown',e=>{isDragging=true;handle.classList.add('dragging');e.preventDefault();});
track.addEventListener('mousedown', e=>{isDragging=true;handle.classList.add('dragging');onScrub(e.clientX);});
window.addEventListener('mousemove',e=>{if(isDragging)onScrub(e.clientX);});
window.addEventListener('mouseup',  ()=>{isDragging=false;handle.classList.remove('dragging');});
handle.addEventListener('touchstart',e=>{isDragging=true;handle.classList.add('dragging');e.preventDefault();},{passive:false});
window.addEventListener('touchmove', e=>{if(isDragging)onScrub(e.touches[0].clientX);},{passive:true});
window.addEventListener('touchend',  ()=>{isDragging=false;handle.classList.remove('dragging');});
setHandle(0);

// ── D3 MAP ─────────────────────────────────────────────────
const svg=d3.select('#map-svg');
let countryLayer=null,pinLayer=null,projection=null,pathGen=null,worldData=null;

function setupMap(){
  const wrap=document.getElementById('map-wrap');
  const W=wrap.clientWidth,H=wrap.clientHeight;
  svg.attr('width',W).attr('height',H);
  svg.selectAll('*').remove();
  projection=d3.geoConicConformal().center([20,52]).parallels([40,65]).scale(W*1.05).translate([W*0.38,H*0.5]);
  pathGen=d3.geoPath().projection(projection);
  svg.append('rect').attr('width',W).attr('height',H).attr('fill','#141c22');
  const g=d3.geoGraticule().step([10,10]);
  svg.append('path').datum(g()).attr('d',pathGen).attr('fill','none').attr('stroke','rgba(255,255,255,0.025)').attr('stroke-width',0.5);
  countryLayer=svg.append('g').attr('class','countries');
  pinLayer=svg.append('g').attr('class','pins');
}

function renderCountries(world){
  const features=topojson.feature(world,world.objects.countries).features;
  const borders=topojson.mesh(world,world.objects.countries,(a,b)=>a!==b);
  countryLayer.selectAll('path.country').data(features).join('path')
    .attr('class',d=>europeanNums.has(d.id)?'country':'country out-of-region')
    .attr('d',pathGen).attr('data-id',d=>d.id)
    .on('click',(event,d)=>{
      const visM=getMajorVisible(currentYear);
      const matchM=visM.find(c=>isoToNum[c.iso]===d.id);
      if(matchM){openModal(matchM);return;}
      const visS=getSecondaryVisible(currentYear);
      const matchS=visS.find(c=>isoToNum[c.iso]===d.id);
      if(matchS)openMinorModal(matchS);
    });
  countryLayer.append('path').datum(borders).attr('d',pathGen).attr('fill','none').attr('stroke','rgba(6,12,8,0.75)').attr('stroke-width',0.55);
}

function getMajorVisible(year){
  const seen=new Set();
  return major.filter(c=>{
    if(year<c.active[0]||year>c.active[1])return false;
    if(seen.has(c.iso))return false;
    seen.add(c.iso);return true;
  });
}

function getSecondaryVisible(year){
  const majorIsos=new Set(getMajorVisible(year).map(c=>c.iso));
  return secondary.filter(c=>{
    if(year<c.active[0]||year>c.active[1])return false;
    if(majorIsos.has(c.iso))return false; // don't double-pin same country
    return true;
  });
}

function updateMap(year){
  const era=getEra(year);
  document.getElementById('era-badge').textContent=era.name;

  const visM=getMajorVisible(year);
  const visS=getSecondaryVisible(year);
  const activeIds=new Set([...visM,...visS].map(c=>isoToNum[c.iso]).filter(Boolean));

  if(countryLayer){
    countryLayer.selectAll('path.country')
      .classed('has-composer',d=>activeIds.has(d.id))
      .classed('active-composer',false);
  }

  if(pinLayer){
    pinLayer.selectAll('*').remove();

    // Draw secondary pins first (underneath)
    visS.forEach(c=>{
      const coords=projection([c.lon,c.lat]);
      if(!coords)return;
      const[px,py]=coords;
      const g2=pinLayer.append('g').attr('class','pin-minor').attr('transform',`translate(${px},${py})`).on('click',()=>openMinorModal(c));
      g2.append('circle').attr('class','pin-dot-minor').attr('r',3.5);
      g2.append('text').attr('class','pin-label-minor').attr('x',7).attr('y',4).text(c.name);
    });

    // Draw major pins on top
    visM.forEach(c=>{
      const coords=projection([c.lon,c.lat]);
      if(!coords)return;
      const[px,py]=coords;
      const g2=pinLayer.append('g').attr('class','pin-major').attr('transform',`translate(${px},${py})`).on('click',()=>openModal(c));
      g2.append('circle').attr('class','pin-pulse').attr('r',5);
      g2.append('circle').attr('class','pin-dot-major').attr('r',5.5);
      g2.append('text').attr('class','pin-label-major').attr('x',9).attr('y',4).text(c.name);
    });
  }

  const total=visM.length+visS.length;
  if(total>0){
    const latest=visM.length>0?visM.reduce((a,b)=>b.born>a.born?b:a):visS.reduce((a,b)=>b.born>a.born?b:a);
    document.getElementById('c-name').textContent=latest.name;
    document.getElementById('c-meta').textContent=latest.country+' · '+latest.era;
    document.getElementById('composer-card').classList.add('visible');
  } else {
    document.getElementById('composer-card').classList.remove('visible');
  }
}

// ── MODALS ─────────────────────────────────────────────────
function spotifyEmbed(q){ return 'https://open.spotify.com/embed/search/'+encodeURIComponent(q)+'?utm_source=generator&theme=0'; }
function spotifyURL(q){ return 'https://open.spotify.com/search/'+encodeURIComponent(q); }
function ytURL(q){ return 'https://www.youtube.com/results?search_query='+encodeURIComponent(q); }

function openModal(c){
  document.getElementById('m-year').textContent=c.born;
  document.getElementById('m-era').textContent=c.era;
  document.getElementById('m-name').textContent=c.name;
  document.getElementById('m-country').textContent=c.country;
  document.getElementById('m-genre').textContent=c.genre;
  document.getElementById('m-bio').textContent=c.bio;
  document.getElementById('spotify-frame').src=spotifyEmbed(c.search);
  document.getElementById('spotify-btn').href=spotifyURL(c.search);
  document.getElementById('yt-btn').href=ytURL(c.search);
  document.getElementById('modal-backdrop').classList.add('open');
  if(countryLayer)countryLayer.selectAll('path.country').classed('active-composer',d=>d.id===isoToNum[c.iso]);
}

function closeModal(){
  document.getElementById('modal-backdrop').classList.remove('open');
  document.getElementById('spotify-frame').src='';
  if(countryLayer)countryLayer.selectAll('path.country').classed('active-composer',false);
}

function openMinorModal(c){
  const q = c.name+' '+c.genre.split('·')[0].trim();
  document.getElementById('mm-year').textContent=c.born;
  document.getElementById('mm-era').textContent=c.era;
  document.getElementById('mm-name').textContent=c.name;
  document.getElementById('mm-country').textContent=c.country;
  document.getElementById('mm-genre').textContent=c.genre;
  document.getElementById('mm-bio').textContent=c.bio;
  document.getElementById('mm-spotify-frame').src=spotifyEmbed(q);
  document.getElementById('mm-spotify').href=spotifyURL(q);
  document.getElementById('mm-yt').href=ytURL(q);
  document.getElementById('minor-modal-backdrop').classList.add('open');
  if(countryLayer)countryLayer.selectAll('path.country').classed('active-composer',d=>d.id===isoToNum[c.iso]);
}

function closeMinorModal(){
  document.getElementById('minor-modal-backdrop').classList.remove('open');
  document.getElementById('mm-spotify-frame').src='';
  if(countryLayer)countryLayer.selectAll('path.country').classed('active-composer',false);
}

document.getElementById('modal-backdrop').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('minor-modal-backdrop').addEventListener('click',function(e){if(e.target===this)closeMinorModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeMinorModal();}});

// ── INIT ──────────────────────────────────────────────────
setupMap();
fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r=>r.json())
  .then(world=>{
    worldData=world;
    document.getElementById('loading').style.display='none';
    renderCountries(world);
    updateMap(START_YEAR);
  })
  .catch(()=>{document.getElementById('loading').textContent='Map requires an internet connection to load.';});

window.addEventListener('resize',()=>{setupMap();if(worldData){renderCountries(worldData);updateMap(currentYear);}});
</script>
